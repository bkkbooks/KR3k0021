body:
  text: 厯代制度詳説卷四宋吕祖謙撰漕運制度納賦禹貢百里賦納總二百里納銍三百里納秸服四百里粟五百里米則物重而麄者為近賦物輕而精者為逺賦若數千里漕運其費百倍通典軍漕齊威公伐楚歸鄭申侯曰師若出於陳鄭之間共其資糧屝屨其可也左傳僖四年管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則衆有饑色漢髙祖二年擊楚蕭何守關中計户轉漕給軍五月髙帝屯滎陽築甬道屬河以取敖倉粟在滎陽西北山上臨河後漢光武北征燕代命冦恂守河内收租四百萬斛轉以給軍以輦車驪駕轉輸不絶長安漕秦輸粟於晉自雍及絳相繼命之曰泛舟之役左傳僖十三年從渭水運入河隂漢文帝時賈誼説上曰天子都長安而以淮南東道為奉地鏹道數千或乃越諸侯而逺調古者天子地方千里中之而為都輸将繇使其逺者不在五百里而至公侯地百里中之而都輸将繇使逺者不在五十里而至輸者不苦其繇二者不傷其費及秦輸将起海上而來一錢之賦數十錢之費不輕而致也帝不能用通典隋開皇三年議為水旱之備於是詔於蒲陜許汝等水次十三州置募運米丁又於衛州置黎陽倉洛州置河陽倉陜州置常平倉華州置廣通倉轉相灌注漕關東及汾陽之粟以給京師隋志煬帝大業元年開通濟渠引穀洛水達於河通於淮海詳見汴漕門唐都長安初江淮漕租米至東都輸含嘉倉以車或䭾陸運至陜而水行來逺多風波覆溺之患其失常十七八其率一斛得八斗為成勞而陸運至陜纔三百里率兩斛計傭錢千民送租者皆有水陸之直唐志開元二十一年京兆尹裴耀卿奏秦中地狹取粟不多陛下數幸東都以就貯積若能轉廣陜運即無憂水旱東都至陜河路艱險江南租船候水始進吳人不便漕輓由是所在停留望於河口置一倉納河東租米便放船歸從河口即分入河洛官自雇船載運至三門之東置一倉三門既水險即於河岸開山車運數十里至三門之西又置一倉每運至倉即般下貯水通即運水細便止自太原倉泝河入渭更無停留前漢都關中稍久及隋亦在京師縁河皆有舊倉上然其言敕蕭炅檢右倉置河隂縣及河隂倉河西柏崖倉三門東集津倉三門西置鹽倉開三門山十八里以避湍險自江淮而泝鴻溝悉納河隂倉自河隂候水漲涸漕送含嘉倉又取習河水者遞送納太原倉所謂北運自太原倉浮於渭以實關中三年凡運米七百萬石省陸運之傭三十萬緡耀卿罷相北運頗艱米嵗至京師纔百萬斛二十五年遂罷北運通典及唐會要唐書志肅宗寶應元年元載以淮河阻兵飛輓路絶鹽鐵租賦皆泝漢而上會要末年史朝義兵分出宋州淮運阻絶劉晏運江淮粟帛由襄漢越商於以輸京師唐志代宗廣徳二年以劉晏顓領東都河南淮西江南東西運漕故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗粟費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十人自揚州遣将部送至河隂上三門號上門填闕船米斗減錢九十調巴蜀襄漢麻枲竹篠為綯挽舟以朽索腐材代薪物無弃者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉嵗轉粟百一十萬石無升斗溺者唐志李泌益鑿集津倉山西逕為運道屬於三門倉又為入渭船輸東渭橋大倉米至凡百三十萬石遂罷南路陸運唐志江淮漕魯哀公九年秋吳城䢴溝通江淮於䢴江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是司馬宣王使鄧艾行陳項已東至夀春艾以為田良水少宜開河渠澆溉大積軍糧又通運漕之道事皆施行正始四年乃開廣漕渠等東南有事軍興泛舟而下達於江淮資食有儲而無水害三國志鄧艾傳晉志云宣王善鄧艾計修廣淮陽百尺二渠上引河流下通淮潁大治諸陂於潁南潁北穿渠三百餘里溉田二萬頃淮南北皆相接連後魏經略江南有司請於小平石門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閣每軍國有須應機漕引通典義熙五年二月劉裕抗表北討慕容起浮淮入泗五月入下邳留船步軍至琅邪六月克廣固城館穀於青土停江淮轉輸南史北邊漕秦欲攻匈奴運糧使天下飛芻輓粟起於黄腄琅邪負海之郡轉輸北河黄腄二縣並在東萊黄即今黄縣腄即今文登縣並今東牟郡縣琅邪今髙密琅邪郡北河今朔方河北率三十鍾而致一石通典六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石隋大業四年發河北百餘萬衆開永濟渠引泌水通涿郡自是丁男不供始以婦人從役通典大業七年東伐髙麗來䕶兒以舟師濟滄海舳艫數百里並載軍糧期與大兵會平壤隋志漕計漢漕運山東之粟以給中都嵗不過數十萬石漢志武帝時官多徒奴婢衆河漕渡四百萬石及官自糴乃足漢志唐貞觀永徽之際每年轉運不過一二十萬石開元國用漸廣每年陜洛漕運數倍於前支猶不給通典睿宗先天二年詔河南陜運兩使每常運一百八十萬石送京師令大倉支計有餘今年所運宜停唐會要開元中崔希逸嵗運百八十萬石食貨志天寶中每嵗水陸運米二百五十萬石入關大厯後水陸運每嵗百八十萬石入關通典代宗時劉晏嵗轉粟百一十萬石唐志劉晏後江淮米至渭橋寖減至李巽為諸道轉運鹽鐵使乃復如晏之多後漕益少江淮米至渭橋者纔二十萬斛唐志國朝水運四河所運江淮㳂泝入汴陜西自黄河三門㳂泝入汴陳蔡自恵民河而至京東自廣濟而至國初未有定制太平興國六年始至汴河嵗運江淮税米三百萬石豆百萬石大中祥符初七百萬石此最登之數也天禧末諸州軍水運上供金帛緡錢二十三萬一千餘貫兩端匹珠寶香藥三十七萬五千餘斤國朝會要太宗時嵗增江浙米四百萬石會要景徳三年上供六百萬石永為定制天聖四年每年五百四十萬石並會要隴蜀漕後漢隗囂據隴來歙伐之留屯長安大轉糧運本傳東觀記曰詔於汧積穀六百萬斛驢四百頭負䭾蜀諸葛亮九年出祁山以木牛運十二年由斜谷出以流馬運蜀志陸運東晉成帝咸和六年以海賊冦抄運漕不繼發王公以下千餘丁各運米六斛穆帝時糧運不繼制王公以下十三户共借一人助度支運通典漢髙帝滎陽築甬道光武河南輦轉輸並見軍漕門唐河南至陜陸運三門裴耀卿李泌陸運並見長安漕門後漢汧運蜀祁山斜谷運並見隴蜀漕門唐陸行里程見漕法門國朝陸運川陜諸州軍金帛自劍州列置遞夫由湖南江陵荆門而至福建自洪州渡江由舒州至而又有川陜布綱供京西諸軍用度由荆南襄州列遞轉送舊自廣南至京有香藥遞舖今已散去諸州陸運惟主綱者部送道路給券不置使主之諸邊戍軍衣賞給亦多陸運送致國朝會要汴漕隋煬帝大業元年發河南諸郡男女百餘萬開通濟渠自西苑引穀洛水達於河通於淮海自是天下利於轉輸通典隋志云煬帝開渠引穀洛水自西苑入而東注於洛又自板渚引河達於淮海謂之御河河畔築御道樹以栁國朝水運自江淮南兩浙荆湖南北路運每嵗租糴至真揚楚泗州置轉般倉受納分調舟船計綱泝流入汴至京師發運使領之諸州錢帛雜物軍器上供亦如之國朝會要國朝置淮南兩浙江湖路都大發運使副使都監以朝官已上或諸司使充至道元年始命洛苑副使楊允恭西京作坊副使李廷遂太子中允王子輿為江淮兩浙發運使於淮南創使廨三年罷發運使自後並以淮南轉運使領其務景徳二年以崇儀副使李溥制置淮南江浙荆湖茶鹽􅈨税兼都大發運使三年以馮亮為都大發運使景祐元年罷江淮發運使五年復置國朝會要至道元年帝問侍臣汴水疏鑿之由參知政事張洎云禹於滎澤下分大河為隂溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠東經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌滎陽郡謂之鴻溝即出河之溝亦曰旁溝漢明帝時樂浪人王景謁者王吳始作浚儀渠渠水東合濟水東至注敖山北渠水至此又兼邲之目邲之目疑有訛字即春秋時晉楚戰於邲是也邲又音汳汳即汴字古人避反故改從汴字隋煬帝開汴水目為通濟渠自後利於轉輸國家甲卒數十萬並萃京師恵民金水五丈清汴等四渠合會天邑舳艫相接所以无匱乏也嘉祐三年詔令江南東西荆湖北路兩浙轉運司限一年各限船添艄工及駕船卒團成本路糧綱自嘉祐五年為始止令逐路據年額斛斗般倉却運鹽歸本路發運司更不得支撥裏河鹽糧綱往諸路初發運使許元言江南東西荆南三路上供斛斗舊皆逐路載至真楚泗州復載鹽以回而汴船不出外江謂之裏河綱每嵗往來四運入京乃敷上供之數至十月放牽駕兵歸營謂之放凍比年諸路轉運司年額不敷發運司不放兵卒歸乃令出外江邊㳂江州軍載頭運故諸路糧船大半為雜般綱惟要發運司般鹽往遂運米而還且汴船不諳外江風水沉失者多既從許元議而會元罷去不即行故特降是詔而諸路舟終少發運司又奏乞令汴綱出漕而執政輒以前詔絶之諸路船患船不得出兵艄訖冬坐食而苦不足皆盜拆船材以費船愈壊漕年額又愈不及執政初但欲漕卒得歸息而近嵗糧綱多雇夫每船卒不過一二人既至冬當令守船又實無得息者至治平三年乃詔汴江出漕然尚限數其後遂復許皆出如故會要陜漕國朝陜西諸州芻粟自黄河三門㳂流入汴至三門㳂白波發運使判官催綱領之會要國朝有三門白波黄渭汴河水路發運使一人在三門以朝官充三門判官一人白波判官一人以京朝官充惠民河漕後周世宗顯徳六年二月命韓令坤自京東疏閔水入於蔡河五代會要恵民河與蔡河一水即閔河也建隆元年始命陳承昭導閔河自新鄭與蔡水合貫京師南厯陳穎達夀春以通淮右舟楫於是以河西為閔河東南為蔡河至開寶六年三月始改閔河為恵民河國朝陳穎許蔡光夀諸州之粟帛自石唐恵民河㳂泝而至置催綱領之並國朝會要廣濟河漕周顯徳四年詔疏下汴水一派北入於五丈河又東達於濟自是齊魯之舟楫皆至京師六年命袁彦浚五丈河以通漕運五代會要廣濟河自都城厯漕濟及鄆其廣五丈舊云五丈河開寶六年詔改今名國朝會要國朝京東諸州軍粟帛自廣濟河而至會要顯徳二年於京城西北引水入五丈通於濟建隆二年詔陳承昭於京城之西夾汴水造斗門引京索蔡河水通城壕入斗門俾架流汴水之上通滙於五丈河以便東北漕運即金水河國朝河北衛州東北有御河至乾寧軍食饋邊亦有廷臣主之會要國朝川益諸州租市之布自嘉州水運至荆南自荆南改裝舟船遣綱送京師會要唐咸通二年南蠻陷交趾陳磻石専督海運於是軍不缺供唐會要漕法唐制凡陸行之程馬日七十里步及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里㳂流之舟即輕重同制河日一百五十里江一百里餘水七十里唐會要其三峽底柱之數不拘此限若遇風波水淺不得行者即於隨處官司申牒檢記聴折半功周顯徳二年正月上謂侍臣曰轉輸之物向來皆給斗耗自漢以來不與支破倉廩所納新物尚被省耗況水路所般豈無損失今後每嵗一石宜與耗一斗五代會要大中祥符八年鹽百萬倉廩侯晟言收到出剰乞行酬奨詔自京畿達淮泗轉漕至多若無增損之多寧有羨餘之積應諸倉監官收到出剰並不理為勞績國朝會要詳説古者天子中千里而為都公侯中百里而為都天子之都漕運東西南北所貢入者不過五百里諸侯之都漕運所貢不過五十里所以三代之前漕運之法不備雖如禹貢所載入於渭亂於河之類所載者不過是朝廷之路所輸者不過幣帛九貢之法所以三代之時漕運之法未甚講論正縁未是事大體重到得春秋之末戰國之初諸侯交相侵伐争事攻戰是時稍稍講論漕運之法然所論者尚只是行運之漕至於國都之漕亦未甚論且如管子所論粟行三百里則無一年之積粟行四百里則無二年之積粟行五百里則衆有饑色如孫武所謂千里饋糧士有饑色皆是出征轉輸至其所以輸國都不出五百里五十里國都所在各有分故當時亦尚未講論惟是後來秦併諸侯罷五等置郡然後漕運之法自此方詳秦運天下之粟輸之北河是時蓋有三十鍾致一石者地理之逺運粟之多故講論之詳方自此始後來厯代全備無如漢唐在漢初髙后文景時中都所用者省嵗計不過數十萬石而足是時漕運之法亦未講到得武帝官多役衆在關中之粟四百萬猶不足給之所以鄭當時開漕渠六輔渠之類蓋縁當時用粟之多漕運不得不講然當漢之漕在武帝時諸侯王尚未盡輸天下之粟至武宣以後諸侯王削弱方盡輸天下之粟漢之東南漕運至此始詳當髙帝之初天子之州郡與諸侯封疆相間雜諸侯各據其利粟不及於天子是時所以淮南東道皆天子奉地如賈生説是漢初如此至漢武帝時亦大槩有名而無實其發運粟入關當時尚未論江淮到得唐時方論江淮何故漢會稽之地去中國封疆遼逺開墾者多粟不入京都以京都之粟尚不自全何況諸侯自封殖且如吳王濞作亂枚乗之説言京都之倉不如吳之富以此知當時諸侯殖利自豐不足運江淮之粟到唐時全倚辦江淮之粟唐太宗以前府兵之制未壊有征行便出兵兵不征行各自歸散於田野未盡仰給大農所以唐髙祖太宗運粟於關中不過十萬後來明皇府兵之法漸壊兵漸漸多所以漕粟自此多且唐睿宗明皇以後府兵之法已壊是故用粟乃多向前府兵之法未壊所用粟不多唐漕運時李傑裴耀卿之徒未甚講論到二子講論自是府兵之法既壊用粟既多不得不講論且如漢鄭當時之議却不曾見於髙恵文景之世唐之李傑裴耀卿之議却不曾見於髙祖太宗之世但只見於武宣中睿明皇之時正縁漢武帝官多役衆唐中睿以後府兵之法壊聚兵既多所以漕運不得不詳大抵這兩事常相為消長兵與漕運常相關所謂宗廟社饗之類十分不費一分所費廣者全在用兵所謂漕運全視兵多少且唐肅宗代宗之後如河北諸鎮皆强租税不領於度支當時有如吐蕃回紇為亂所用尤多鎮武天徳之間嵗遣兩河諸鎮所以全倚辦江淮之粟議論漕運其大畧自江入淮自淮入汴自洛入河自河入渭各自正輸水次各自置倉如集津倉洛口倉含嘉倉河隂倉渭橋轉相般運道途之逺此法遂壊自當時劉晏再整頓運漕之法江淮之道各自置船淮船不入汴汴船不入河河船不入渭水之曲折各自便習其撡舟者所以無傾覆之患國計於是足所以唐人講論之多惟江淮為最急徳宗時縁江淮米不至六軍之士脱巾呼於道韓滉運米至徳宗太子置酒相慶可見唐人倚辦於此如此其急唐時漕運大率三節江淮是一節河南是一節陜西到長安是一節所以當時漕運之臣所謂無如此三節最重者京口初京口濟江淮之粟並會於京口京口是諸侯嚥喉處初時潤州江淮之粟至於京口到得中間河南陜西互相轉輸然而三處惟是江淮最切何故皆自江淮發足所以韓滉由漕運致位宰相李錡因漕運飛揚跋扈以至作亂以此三節惟是京口最重所謂漢漕一時所運臨時制宜不足深論到得本朝定都於汴是時漕運之法分為四路東南之粟自淮入汴至京師若是陜西之粟便自三門白波轉黄河入汴至京師若是陳蔡一路粟自恵民河至京師京東之粟自廣濟河至京師四方之粟有四路四條河至京師當時最重者惟是汴河最重何故河西之粟江無阻及入汴大計皆在汴其次北方之粟自三門白波入關自河入汴入京師惟恵民廣濟來處不多其勢也輕本朝置發漕兩處最重者是江淮至真州陸路轉輸之勞其次北方之粟底柱之門舟楫之利若其他置發運如恵民河廣濟河雖嘗立官然不如兩處之重此本朝之大畧如此然而本朝所謂嵗漕六百萬石専倚辦江淮其所謂三門白波之類非大農仰給之所惟是江淮最重在祖宗時陸路之粟至真州入轉般倉自真方入船即下貯發運司入汴方至京師諸州回船却是真州請鹽散於諸州諸州雖有費亦有鹽以賞之此是本朝良法凡以江淮往來遲速必視風勢本朝發運使相風旗有官専主管相風旗合則無罪如不合便是奸弊夫船之遲速何故以風為旗蓋縁風動四方萬里只是一等所以使得相風旗真州便是唐時楊子江後來本朝改號曰真州運法未壊諸州船只到真州請鹽回其次入汴入京師後來發運嵗造船謂之發運官船與諸州載米發運申明汴船不出江諸州又自造船雖有此約束諸州船終不應副因此漕法漸壊惟發綱發運未罷乃蔡京為政不學無術不能明考祖宗立法深意遂廢改鹽法置直達法無水次不如此是時奸吏多雖有運漕之官不過催督起發其官亦有名而無實大抵用官船逐處漕運時便都無奸計若用直達法經涉嵗月長逺故得為奸所費甚多東南入京之粟亦少故太倉之粟少東南蓄積發運有名無實此召亂之道也本朝漕運之法壊自蔡京東京發運本原大略如此其他流之曲直法之更變道路之險夷質之於史考之於古亦自可見厯代制度詳説卷四
