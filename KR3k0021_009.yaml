  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0021_WYG_009-1a, image: WYG0923/WYG0923-0967a.png}
body:
  text: 厯代制度詳説卷九宋吕祖謙撰田制制度井田小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事受田大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畝一易之地家二百畝再易之地家三百畝民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處農民户人已受田其家衆男為餘夫亦以口授田如比士工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所強也任田載師掌任土之法以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地代田武帝末年悔征伐之事乃封丞相田千秋為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉過能為代田一畝三甽嵗代處古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃用耦犂二牛三人一嵗之收常過縵田畝一斛以上善者倍之過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛無以趨澤故平都令光教過以人挽犂過奏光以為丞教民相與庸挽犂率多人者田日三十畝少者十三畝以故田多墾闢過試以離宫卒田其宫壖地課得穀多其旁田畝一斛以上令命家田三輔公田又教邊郡及居延城是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多名田漢武帝時董仲舒説上曰秦用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者無立錐之地又専川澤之利管山林之饒荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困漢興循而未改井田法雖難猝行宜少近古限民名田以贍不足塞兼并之路鹽鐵皆歸於民去奴僕除専殺之威薄賦斂省徭役以寬民力然後可善治也仲舒死後功費愈甚天下虛耗人復相食哀帝即位師丹輔政建言古之聖王莫不設井田然後治乃可平今纍世承平豪富吏民資數巨萬而貧民愈困蓋君子為政貴因循而重改作然所以有改者將以救急也亦未可詳宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關內侯吏民名田皆無過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人期盡三年犯者沒入官時田宅奴婢賈為減賤丁傅用事董賢隆貴皆不便也詔書且須後遂寢不行公田孝宣地節三年詔曰郡國宫館勿復修治流民還鄉者假公田貸種食孝元初元元年以三輔太常郡國公田及苑可省者振業貧民江海陂湖園池屬少府者以假貧民勿租賦王田王莽更名天下田曰王田奴婢曰私屬皆不得買賣其男口不滿八而田過一井者分餘田與九族鄉里犯令法至死制度不定吏緣以為姦天下敖敖然陷刑者衆後三嵗莽知民愁下詔諸食王田及私屬皆得買賣勿拘以法均田後魏孝文太和元年三月詔曰去年牛疫死大半今東作既興人須肄業有牛者加勤於常嵗無牛者倍傭於餘年一夫制理四十畝中男二十畝無令人有餘力地有遺利時李安世上疏曰今雖桑井難復宜更均量審其經術令分藝有準力業相稱細民獲資生之利豪右靡餘地之盈帝深納之均田之制起於此矣九年下詔均給天下人田諸男十五以上受露田四十畝婦人二十畝後周文帝霸政之初創置六官司均掌田里之政令分田數以定田畝隋開皇中發使四出均天下田口分永業田北齊武成帝河清三年詔令男子十八受田輸租調二十充兵六十免力役六十六退田免租調京師四面諸方之外三十里之內為公田受公田者三縣為遷户執事官一品以下逮於羽林武賁各有差其外畿郡華人官第一以下羽林武賁以上各有差執事及百姓請墾田者名為永業田隋文帝令自諸王以下至於都督皆給永業田各有差多者至百頃少者至三十頃其丁男中男永業露田皆遵後齊之制唐授田之制男年十八以上者田一頃其八十畝為口分二十畝為永業老及篤疾廢疾者人四十畝寡妻妾三十畝當户者增二十畝皆以二十畝為永業其餘皆口分永業之田樹榆棗桑及所宜之木皆有數田多可以足其人者為寬鄉少者為狹鄉受田減寬鄉之半其地有薄厚嵗一易者倍授之寬鄉三易者不倍授工商者寬鄉減半狹不給凡庶人徙鄉及貧無以葬者許賣世業田自狹鄉而徙寬鄉者得并賣口分田已賣者不復授死者收之以授無田者詳説天下之事不知而不行者其害淺知之而不得行者其害深夫天下大利或藏於隱微之中智者不能謀勇者不能斷出於天下思慮之所不及此雖有堯舜之君禹稷之臣猶必有所待於其後何者不知而不可強行也舉天下之事智者能謀之勇者能斷之而儒者又世守之非必堯舜禹稷之君臣而能行之然而有不得焉者是可嘆也永惟厯代之田制上古有井田漢有限田名田教代田建武之際有度田晉有占田後魏有露田齊有給受田而唐有口分世業之田其法制或詳或略其行之或逺或近其利或厚或薄然大要以為田之制在上而惟其不知而不行之茍其知矣則未有不可行者也今世學者坐而言田制然天下無在官之田而賣易之柄歸之於民則是舉今之世知均田之利而不得為均田按此下原缺厯代制度詳説卷九
