body:
  text: 厯代制度詳説卷十一宋吕祖謙撰兵制制度厯代之制兵之所來尚矣自黃帝有涿鹿之戰顓頊氏有共工之陳夏有甘扈之誓商周以兵定天下矣天下既定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅以足食賦以足兵四井為邑四邑為丘丘十六井有戎馬一牛三四丘為甸甸六十四井有戎馬四兵車一乘牛十二甲士三人卒七十二人干戈備具是謂乘馬之法一同百里提封萬井除山川沈斥城池邑居園囿衢路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五年大簡車徒此先王為國立武足兵之大略也齊桓任管仲而國富民安公問行霸行師之道管仲曰公欲定卒伍修甲兵大國亦將修之而小國設備則難以速得志矣於是乃作內政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之緩急足以相助其教已成尊天子以安百姓荀子曰齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義漢髙祖既定天下踵秦而置材官於郡國京師有南北軍之屯至武帝平百粵內增中壘屯騎步兵越騎長水胡騎射聲虎賁八校尉而外有樓船皆嵗時講肄修武備之事元帝時以貢禹議始罷角抵而未正治兵振旅之事也隋志十二衛曰翊曰驍騎曰武曰屯曰禦曰候分為左右皆有將軍以分統諸府之兵府有郎將副郎將坊主團主以相統制又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅唐府兵之制起自西魏後周而備於隋唐因之自髙祖初起開大將軍府以建成為左領大都督燉煌公為右領大都督元吉統中軍發自太原有兵三萬人及諸起義以相屬與降羣盜得兵二十萬析關中為十二道皆置府凡民年二十為兵六十而免其能騎而射者為越騎其餘為步軍武騎髙宗武后時天下久不用兵府兵之法寖壞畨役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請募士宿衛十一年取京兆蒲同岐華府兵及白丁益以潞州長從兵共十二萬號稱長從宿衛嵗一畨命尚書左丞與州吏共選之明年更號曰彍騎天寶以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可校李林甫遂請停上下魚書其後徒有兵額官吏而戎器駝馬鍋幕糗糧並廢矣初府兵之制居無事時其畨上者宿衛京師而已若四方有事則命將以征事解輒罷兵散於府將歸於朝故士不失業而將無握兵之重所以防微杜漸絶禍亂之萌也府兵法壞而方鎮盛武夫悍將雖無事據要險専方面既有土地又有人民又有其甲兵有其財賦布列天下然則方鎮不得不強京師不得不弱故曰措置之勢使然者以此也方鎮節度使之兵也原其始起於邊將之屯防者唐初兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之者曰道自武德天寶以前邊防之制其戍鎮守捉皆有使而道有大將一人曰大總管已而更名曰大都督至太宗時行軍征討曰大總管在本道曰大都督髙宗永徽以後都督帶使持節者謂之節度使然猶未以名官景雲三年以賀拔延嗣為涼州都督河西節度使自此而後接乎開元朔方隴右河東河西皆置節度使及范陽節度使安祿山反天子之兵弱不能抗遂陷兩京肅宗起靈武而諸鎮之兵共起誅賊其後祿山子慶緒及史思明父子繼起中國大亂肅宗命李光弼等討之號九節度之師久之大盜既滅武夫戰卒以功起行陳列為侯王者皆為節度使由是方鎮相望於內天下之兵無復勤王者向之所謂三鎮者徒能始禍而已自國門以外皆分裂於方鎮矣宋朝神宗將北伐取三晉之民十萬為精鋭其後又詔陜右籍民兵比年以來復行什伍之令五家為保二十五家為甲有正有長以率其民訓練大司馬仲春教振旅司馬以旗致民平列陳如戰之陳云云遂以搜田有司表貉誓民遂圍禁火弊獻禽以祭社云云仲夏教茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用云云遂以苗田如搜之法車弊獻禽以享社云云仲秋教治兵如振旅之陳辨旗物之用云云遂以獮田如搜田之法羅弊獻禽以祀祊云云仲冬教大閲前期羣吏戒衆庶修戰法云云徒乃弊致禽饁獸於郊入獻禽以享蒸齊桓既沒晉文接之先定其民作被廬之法總帥諸侯迭為盟主然其禮已僭差又隨時茍合以求欲速之功故不能充王制魯成公作丘甲哀公用田賦搜狩治兵大閲之事皆失其正春秋書而譏之以存王道於是師旅亟動百姓罷敝無仗節死難之誼孔子傷焉曰以不教民戰是謂棄之其後滅弱吞小並為戰國稍增講武之禮以為戲樂用相誇視而秦更名角抵先王之禮沒於淫樂中矣漢文帝躬戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於壩上棘門細栁後漢立秋之日郊禮畢始揚威武斬牲於東門以薦陵廟其儀乘輿御戎路白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車馳駟送陵廟還官遣使者賫束帛以賜武官武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳名曰乘之唐髙祖武德八年十一月庚子講武於同官玄宗開元初講武新豐詔薛訥為左軍節度時諸部頗失序惟訥與解琬軍不動帝令召之至軍門不得入禮成尤見慰勞先天二年玄宗講武驪山唐紹以典儀失軍容當斬帝怒甚坐紹纛下左右猶冀少貸金吾將軍李邈遽傳詔斬之時深咎邈帝亦悔玄宗講武驪山既三令帝親鼓之郭元振遽奏禮止帝怒軍容不整引坐纛下將斬之劉幽求張説叩馬諫曰元振有大功雖有罪當宥乃赦死流新州宿衛周官宫正掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨外內而時禁稽其功緒糾其德行幾其出入均其稍食去其淫怠與其奇邪之民會其什伍而教之道藝月終則會其稍食嵗終則會其行事宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之月終則均秩嵗終則均敘以時頒其衣裘掌其誅賞前漢郎中令秦官掌宫殿掖門户有丞武帝太初元年更名光祿勳屬官有大夫郎謁者皆秦官又期門羽林皆屬焉衛尉秦官掌宫門衛屯兵有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞衛士三丞又諸屯衛候司馬二十二官皆屬焉郎掌守門户出充車騎有議郎侍郎郎中皆無員員多至千人後漢光祿勳掌宿衛宫殿門户典謁署郎更直執戟宿衛門户考其德行而進退之五官中郎將五官中郎五官侍郎五官郎中凡郎官皆主更直執戟宿衛諸殿門户出充車騎左右僕射主虎賁郎習射左右陛長主直虎賁朝會在殿中虎賁中郎將中郎郎中羽林中郎將羽林郎無員掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家子弟補唐左右監門衛掌諸禁衛門籍之法左右千牛衛掌侍衛及宫殿之儀仗親衛一府勳衛二府翊衛二府凡五府每府中郎將一人左右郎將各一人凡府中郎將掌領校尉旅師親衛之屬宿衛者而總其府事左右郎將二焉畨上者以名籍上於大將軍而配以職武德貞觀世重資蔭二品三品子補親衛二品曾孫三品孫四品子職事官五品子若孫勳官三品以上有封及國公子補勳衛及率府親衛四品孫五品及上柱國子補翊衛及率府勳衛勳官二品及縣男以上子散官五品以上子補諸衛及率府翊衛王府執仗親事執乘親事每月畨上者數千人宿衛內府及城門給廩食執扇三衛三伯人其後入官路難三衛非權勢子弟輒退畨柱國子有白首不得進者流外雖鄙不數年給廩祿故三衛益賤人罕趨之左右衛凡五府三衛及折衝府驍衛畨上者受其名簿而配以職左右衛左右驍衛左右武衛左右威衛左右領軍左右金吾左右監門衛左右千牛衛凡十六衛左右千牛衛掌侍衛及供御兵仗以千牛備身左右執弓箭宿衛以主仗守戎器折衝都尉掌領屬備宿衛師役則總戎具資糧點習以三百人為團一校尉領之國朝宿衛之法其任遙領於宗室散官其實則常處以武夫兵吏詳説古制兵之善無如邱甸後世則無如府衛然此二者異用不可以不知自黃帝堯舜以來所以治天下出於一本故萬民無以生養則授之田而使耕築之室而使居及其可以養生而無以自衛則教之為兵蓋本以備人之侵暴當是時盡天下之民皆可以為兵乃是其理當然而後世乃謂三代寓兵於農是未嘗知立國意者也至於聖人不作而力征爭奪之事起驅其民以為戰者皆是為一人之私孟子所謂梁惠王以土地之故糜爛其民及善戰者服上刑言後世之兵非為民之舉盡徇人君之私欲雖桓文之師亦不過如此延及秦漢魏晉南北十二國割據天下無日不用兵既取其財又奪其耕又殺其身生民之禍最酷雖云兵農已分然其所謂調發皆具於民蓋民無不可以為兵者故府衛之制取其人以為兵皆蠲其征徭而使之有定籍於官宿衛征行既有常數則天下之民稍得休息然則所謂府兵者蓋始與民為二矣而論者方以為與井田一法豈不過哉其後府兵之法壞而安史亂作天下復被為兵之苦與秦閭左事無異杜甫歌詩可見本末矣欲一遵聖人治國之制則莫如復邱乘之兵既皆是自衛則無不為兵之理借不及此而所以立兵者或未免為一人之私則莫如復唐府兵彼得盡除賦役徭使而吾常得其人為兵是以利害相博亦足以償矣宋朝制兵之失起於唐室方鎮之兵盛自古未嘗有養兵數十年而不用者孫武云興師十萬日費千金古人止論興師之害耳昆陽之役八十萬淝水之役幾百萬皆是臨時取具於民豈有預養兵數十萬人以待用者耶蓋唐末諸鎮各擅財賦養兵以抗人主唐以是亡而五代之變皆因於兵太祖皇帝懲艾前事所謂出削其權者乃是將權至於兵則未嘗制置太祖方欲以兵定天下故嚴階級之法明撫御之道其時止十五萬則天下之大亦不知有養兵之用太宗皇帝既平太原欲遂取幽州而不克自是無嵗不有契丹之患故末年之兵已至三十萬真宗與北方盟罷兵為和而兵蓋已五十萬矣及元昊為難西方益兵遂至八十萬蓋執國政者不考本末但以益兵為功為將帥者不知力戰惟以益兵為請而天下自是遂以百萬為籍矣嗚呼循目前之弊而狃於後世兵農之既分則真以為兵者所以衛民而民者所以養兵也天下豈有彌厯百數十嵗具百萬之師未嘗有戰鬭之事而飽食安坐以嬉者哉蓋厯代兵制之失未有過此者今天下當分裂之餘而養兵無異於全盛之世京口秣陵鄂渚之兵至二十萬行都衛兵至十四五萬諸州廂禁兵及其它量置戍守者又且二十餘萬而蜀之兵亦幾二十萬然則今世蓋嘗養八十萬之兵也自紹興與敵約和四十餘年不大戰矣自甲申與敵約和十餘年無小鬭矣夫養八十萬之師四五十年而無一日之用也然則若之何歟今天下所以財用虛竭天子焦勞於上而羣臣執事奔走盡力於其下盡用目前茍且之法以罔天下遺利十分之八盡舉以食其兵也天下果可得而治歟論者莫不曰豐財強兵當世之急務夫循今日之養兵則兵益弱而不可強則財益竭而不可豐癰疽之患心腹之憂以制吾國家之命者是兵之為也是兵之為者踵末世之弊而不師古之過也然則執事者何憚而久不為之慮哉弊必有所併害必有所集適當其時甚深之憂必非空言之所能濟也天下之患方其未形也則人以為難知及其既驗也則人以為尚淺而可忽及其方盛也則又以為力之所不能為至其極甚也則遂熟眠退聽之而已矣此四者使有一智者出而維持經營之猶可以少善其後其最難者遭極甚之時天下耳目之所習熟同知其患而以無如之何而遂已者也且養兵之患芽蘖於唐之中世及其末年橫流四出唐既已亡而遺毒餘禍五代之民更迭受之四十餘年其變故之數而天下有不可一朝居之患當此之時束而羈之如馬之在間虎之在圈也自以為安寧而無事矣而豈知承平百年之後養兵益多費財益廣豢習而不用者益可為惴惴之憂哉觀今天下天子大臣早夜皇皇於上郡縣小吏栗栗於下盡有前世聚斂之害而莫當割剝之名夫明知其為天下之大患而不敢措意於其間與茍簡於目前者益滋其患而舉以遺後之人譬如風痺重腿之疾與人命為終始雖磨以嵗月療以藥石恐其猶無益也而甚者以為既若此矣而又加酒色焉故漸而為之者極難甚迂而不可以驟見其功不知為患反加甚焉若益薪於火者今世皆是也此其患則有二添募一也言民兵二也且非不知兵之為無用有漢唐百萬之衆而未見應敵一二之功其所以添募而不得已者真以兒戲待目睫者也又況於民兵乎竭吾力以養是兵而不得辭者彼嘗怖之以冦賊之可畏鋒刃之下性命俄頃之間非我莫能當也今又脫田畝耰鉏之事而助之乎以漸制之者有三精練習一也廢招補二也復府衛三也夫為天下之浮論者曰兵不可不多為國家之實計者則兵益少而後能益精益精而後能以十萬之師為百萬之用敵之所畏畏其精也非畏其多也舊兵之額數名存實亡者盡勿復補遲以十年州郡之廂禁軍其不存而可棄者大半矣於是而為之可庶幾也然而此二事者人以為吾之未能耳不待智者而後知也非有奇䇿何足救患又況驕惰之兵議論所及變且隨起練習未精揀汰先是按是字疑有訛脫則精兵未得其利而罷兵先為患矣況於府衛前世之遺法書傳之軼事以言則可而何以行之其不為笑者幾希故此三利者皆今世之所不得為也所不得為無以救患又加二弊焉嗟夫天下之事非有異術也行之欲堅持之欲久欲無所沮撓而中廢耳然則天下之大體又將有在府衛之外者而何敢言之此故未易出也厯代制度詳説卷十一
