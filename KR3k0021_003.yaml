body:
  text: 厯代制度詳説卷三宋吕祖謙撰賦役制度水役禹曰惟荒度土功弼成五服至於五千州十有二師孔氏傳服五百里四方相距為方五千里治洪水輔成之一州用三萬人九州二十七萬庸正義大司馬法二千五百人為師每州十有二師通計之一州凡三萬人功漢武帝元光中河決瓠子使汲仁郭昌發卒數萬人塞決河漢志漢成帝河平元年河決館陶王延世使塞三十六日河隄成以五年為河平元年漢志隋煬帝大業元年發河南諸郡男女七百萬開通濟渠自西苑引穀洛水達於河自汲引河水通於淮北史紀貢法禹别九州任土作貢孔氏傳任其土地所有定其貢賦之差兖州厥貢漆絲厥篚織文青州厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石徐州厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚玄纎縞揚州厥貢惟金三品瑶琨篠簜齒革羽毛惟木厥篚織貝厥包橘柚錫貢荆州厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛三邦底貢厥名包匭菁茅厥篚玄纁璣組九江納錫大龜豫州厥貢漆枲絺紵厥篚纎纊錫貢磬錯梁州厥貢鏐鐵銀鏤砮磬熊羆狐狸織皮雍州厥貢璆琳琅玕並禹貢周大宰貢賦以馭其用以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢天官大行人邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之藩國世一見各以其所貴寶為貢秋官唐州府嵗市土所出為貢其價視絹之上下無過五十匹異物滋味名馬鷹犬非有詔不獻有加配則以代租賦唐志田租禹任土作貢孔氏傳定其貢賦之差見上正義云賦者自上稅下之名謂治田出穀與周禮九賦全異彼謂賦口率出錢冀州厥賦惟上上錯厥田惟中中兖州厥田惟中下厥賦貞青州厥田惟上下厥賦中上徐州厥田惟上中厥賦中中揚州厥田惟下下厥賦下上上錯荆州厥田惟下中厥賦上下豫州厥田惟中上厥賦錯上中梁州厥田惟下上厥賦下中三錯雍州厥田惟上上厥賦中下禹貢孔氏傳上上第一錯雜也出第二之賦貞正也兖州第九賦正與九相當揚州賦第七雜出第六豫州賦第二又雜出第一梁州賦第八雜出第七第九三等正義云傳以荆州田第八賦第三為人功修也雍州田第一賦第六為人功少也是據人工多少總計以定差冀州以上上為正而雜為次等言出上上時多而上中時少也多者為正少者為雜故云第一冀州言上上錯者少在正下故先言上上而後言錯豫州言錯上中者少在正上故言錯而後言上中此九等所較無多諸州相凖為等級耳鄭玄云賦之差一井上上出九夫稅下下出一夫稅通率九州一井稅五夫如鄭此言上上出稅九倍多於下下鄭詩箋云井稅一夫其田百畝差上上一井稅一夫則下下九井乃出一夫稅太少矣若下下井稅一夫則上上全八言矣豈容輕重頓至是乎禹分田定稅十一而賦萬國以康通鑑夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也孟子注云民耕五十畝貢上五畝七十畝者以七畝助公者耕百畝者徹取十畝謂之徹通其率以什一為正謂郊外用助郊內用貢故引孟子野九夫而稅一國中什一九一者一井九夫之地四面八家各自治一夫中央一夫八家各治十畝入公餘二十畝八家各得二畝半以為廬宅是十外稅一也國內據民住城中其地即在郊內郊鄉遂之民為溝洫為貢法言什一亦什外稅一者也詩甫田疏云言井九百畝其中為公田則中央百畝共為公田不得家取十畝也又言八家皆私百畝知百畝皆屬公矣何得復以二十畝為廬舍也言同養公田則八家共理公事何得家分十畝自治之也若家取十畝自治之安得謂之同養也若二十畝為廬舍則家别二畝半亦入私矣則家别私有百二畝半何得為八家皆私百畝也此皆諸儒之謬鄭于匠人注云野九夫而稅此一箋云井稅一夫其田百畝是鄭意無家别公田十畝及二畝半為廬舍之事俗以鄭説同於諸儒是又失鄭旨矣王制疏云周制畿內用夏之貢法司馬法云成百井三百家井有九家百井即九百家而云一成三百家者以此田上中下除宫室塗巷三分之一自餘通率一家受二夫故一成為三百家是一井九家為定無公田也畿外諸侯雖立公田是實諸侯郊外亦用貢法劉氏以為匠人注引孟子野九夫而稅一國中什一諸侯謂之徹者通其率以什一為正則為九夫之田而稅一國中什一夫之田而稅一是二十夫之田中而稅二計地言之是什中稅一若計夫實稅猶什外稅一但不知諸侯郊內十夫受十一夫之地若何作制耳魯宣公十五年初稅畝春秋公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初魯哀公十二年春用田賦左氏曰季孫欲以田賦春秋丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦周因井廬以定賦稅稅謂公田什一及工商衡虞之入也賦謂供車馬兵甲士徒之役充實府庫賜豫之用稅給郊社宗廟百神之祀天子奉養百官祿食庶事之費漢志通典孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離魏文侯時租稅增倍於常或有賀者文侯曰今戶口不加而租嵗倍此由課多也譬如彼治冶令大則薄令小則厚治人亦如之夫貪其賦稅不愛人是虞人反裘而負薪也徒惜其毛而不知皮盡而毛無所附通典周顯王二十一年秦商鞅更為賦稅法行之通鑑蠲租漢髙祖田租十五而稅一通典漢惠帝即位減田稅復十五稅一本紀漢家初十五稅一儉於周十稅一也中間廢今復之也漢文帝十三年詔曰農天下之本務莫大焉今勤身從事而有租稅之賦是謂本末者無以異也其於勸農之道未備其除田之租稅本紀光武建武六年十二月癸巳詔曰頃者師旅未解用度不足故行十一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制本紀景帝二年令人田租三十而稅一令依景帝故云舊制後漢孝靈中平二年二月張讓説帝稅天下田畝十錢以修宫室鑄銅人樂安太守陸康上疏諫曰昔魯宣稅畝而蝝災自生豈有聚奪民物以營無用之銅自蹈亡主之法哉通鑑唐代宗永泰元年畿內麥稔京兆尹第五琦請稅百姓田十畝收其一曰此古什一之法也上從之大厯元年京兆尹第五琦稅法民苦其重多流亡十一月甲子日南至赦改元悉停什一稅法戶數禹平水土為九州人口千三百五十五萬三千九百二十三周公相成王政理刑措人口千三百七十萬四千九百二十三齊威公二年五千里外非天子之御自太子公侯以下至於庶人凡千一百八十四萬一千九百二十三人至於戰國考蘇張之説計秦及山東六國戎卒尚踰五百餘萬推人口數尚當千餘萬通典漢髙祖定天下人之死傷亦數百萬方之六國十分無三至孝平元始二年人戶千二百二十三萬三千口五千九百五十九萬四千九百七十八太祖開寶九年天下主客戶三百九萬五百四十熙寧十年天下主客户一千四百二十四萬五千二百七十口三千八十萬七千二百一十二力役文王不敢盤於遊田以庶邦惟正之供繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無逸均人掌均地政均地守均地職均人民牛馬車輦之力政政讀為征凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦不收地守地職不均地政三年大比則大均地官注云旬均也疏云王制疏云用民嵗不過三日明不得為旬十日解之故破從均恐不平故云均也豳風七月嗟我農夫我稼既同上入執宫功詩秦北築長城四十餘萬阿房驪山七十萬三十年間百姓死沒相踵於路通典孝文丁男三年而一事通典後周武帝保定元年改八丁兵為十二丁兵率嵗一月役豐年不過三旬中年二旬下年一旬宣帝時增一月功為四十五日隋髙帝受禪依周制役丁十二畨匠則六畨開皇三年減十二畨每嵗為三十日役隋書軍役采薇遣戍役也文王之時西有昆戎之患北有獫狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也小司徒凡起徒役毋過家一人以其餘為羡唯田與追胥竭作地官疏云一家兄弟雖多除一人為正卒正卒之外其餘皆為羡卒此謂六鄉之內以上劑致氓若六遂之內以下劑致氓一人為正卒一人為羡卒其餘皆為餘夫饒逺故也司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終千井三千家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人周禮疏云夫十井為九十夫之地宫室塗巷三分去一唯有六十夫地又不易一易再易通卒三夫受六夫之地三十夫受六十夫之地三十家使出馬一匹士一人徒二人士謂甲士徒謂步卒疏謂天子畿內采地法鄭注論語道千乘之國亦引司馬法彼是畿外邦國法彼革車一乘甲士三人步卒七十二人甲士少步卒多此士十人徒二十人比畿外甲士多步卒少外內有異故也商周因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅者田租也賦謂發賦斂財也稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四邱為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂乘馬之法一同百里提封萬井提舉也舉四封之內也除山川沈斥城池邑居園圃術路三千六百井沈謂居深水之下斥鹵地術大道也定出賦六千四百井戎馬四百匹兵車百乘是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主前漢刑法志管子對威公曰作內政而寓軍令焉威公曰善管子於是制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一帥故萬人為一軍五鄉之帥率之三軍有中軍之鼓有髙子之鼓有國子之鼓春以搜振旅秋以獮治兵是故卒伍整於里軍旅整於郊內教既成令勿使遷徙國語漢髙祖二年漢王屯滎陽蕭何發關中老弱未傅者悉詣軍本紀注傳著也言著名籍給公家徭役也後周武帝保定元年改八丁兵為十二丁兵率嵗一月役北史紀周武帝建德三年改軍士為侍官募百姓充之除其縣籍是後夏人半為兵矣通典隋開皇三年初令軍人二十一成丁隋志口賦太宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦天官財泉穀也賦口率出泉也今之算泉民或謂之賦鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之遂師之職亦云以征其財征皆謂此賦也邦中在城郭者四郊去國百里邦甸二百里家削三百里邦縣四百里邦都五百里此平民也關市山澤謂占會百物幣餘謂占賣國中之斥幣皆末作當增賦者若今賈人倍算矣自邦中以至幣餘各入其所有穀物以當賦泉之數每處為一書所待異也漢髙祖四年八月初為算賦本紀注民年十五以上至五十六出賦錢人百二十為一算為治庫并車馬漢髙祖十一年詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之注諸侯王賦其國中以為獻物又多於郡故百姓疾苦之今諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費本紀漢光武建武二十二年九月戊辰地震裂詔曰日者地震南陽其口賦逋稅勿收責漢儀注曰人年十五至五十六出算錢又七嵗至十四嵗出口錢人二十以供天子至武帝時又口加三錢以補車騎馬逋稅謂欠田租也漢章帝元和元年除算三年徒役宫伯掌王宫之士庶子凡在版者作其徒役之事天官鄭司農云庶子宿衛之官版名籍也玄謂王宮之士謂宫中諸吏之適子也庶子其支庶也徒役之事太子所用治平四年詔官吏有知差役利害可以寬減者實封條析以聞先是三司使韓絳言聞京東民有父子二丁將為牙校者其父遂自經死又聞江南有嫁其祖母及與母析居以避役者此大逆人理役法之議始於此均稅大司徒以土均之法辨五物九等制天下之地征以作民職以全地貢以斂財賦地官疏五物即山林川澤之等是也云九等者據五地之內分為九等之地騂剛赤緹之屬糞種所宜不同也云制天下之地征者言天下則并畿外邦國所稅入天子而言也周顯德五年七月詔近覽元稹長慶集見在同州時所上均田表因令制素成圖賜諸道是時上將均定天下民租故先以均田圖遍賜諸侯其年十月命文穎等二十四人使於諸州檢定民租會要戶籍小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍地官注云夫家猶言男女也鄭司農云九比謂九夫為井玄謂九比者冢宰職出九賦者之人數也施當為弛疏云國中與四郊皆是六鄉之民所居也并言都鄙者司徒是主土地之官故亦兼主采地之法征謂稅之役謂徭役施舍者貴賤老幼廢疾不科役乃頒比法於六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以嵗時入其數以施政教行徵令及三年則大比大比則受邦國之比要注云大比謂使天下更簡閲民數及其財物也要謂其薄疏云民六口以上為多五口以下為少每至三年則大案比户口大比之時則天下邦國送文書來入小司徒案比之法從少至多以五家為始故以比為名梁武帝沈約上言咸和初蘇峻作亂版籍焚燒此後起咸和三年以至於宋並皆詳實朱筆隱注紙連悉縫而尚書上省庫籍唯有宋元嘉中以來晉代舊籍並在下省左民曹謂之晉籍解散於地又無扃縢此籍精詳實宜保惜宋元嘉二十七年始以七條徵發既立此科姦偽互起簿籍於此大壞莫不互相因依競行姦貨凡此姦巧並出愚下不辨年號不識官階或注義熙在寧康之前或以崇安在元興之後此時無此府此年無此國元興唯有三年而猥稱四年又詔書甲子不與長厯相應如此詭謬萬緒千端校籍諸郎亦所不覺且籍字既細難為眼力尋求巧偽莫知所在宜選史傳學士諳究流品者為左民郎左民尚書以晉籍及宋永初景平籍對共讐校詔王僧孺改定百家譜通典隋文帝時民間多妄稱老少以免賦役山東承北齊之弊政戶口租調姦偽尤多隋文帝命州縣大索貌閲戶口不實者里正黨長逺配大功以下皆令析籍以防容隱於是計帳得新附一百六十四萬餘口髙熲又言民間課輸無定簿難以推校請為輸籍法遍下諸州每年正月五日縣令巡人各隨便近五黨三黨共為一團依樣定户上下帝從之自是姦無所容矣諸州調物每嵗河南自潼關河北自蒲坂輸長安者相屬於路晝夜不絶者數月通鑑通興隋髙熲建輸籍之法於是定其名輕其數使人知為浮客被強家收大半之賦為編氓奉公上蒙輕減之征浮客謂避公稅依強家作佃家也先敷其信後行其令蒸庶懷惠姦無所容隋氏資儲遍於天下人俗康阜熲之力焉功規管葛道亞伊吕近代以來未之有也玄宗開元八年戶自占者給復五年開元十二年宇文融乘驛周流天下州縣畏融多張虛數凡得客户八十餘萬田亦稱是嵗終增緡錢數百萬通鑑憲宗元和元年李吉甫撰元和國計簿上之總計天下方鎮四十八道管州府二百九十三縣一千四百五十二其鳳翔鄜坊邠寧鎮武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西淄青等十五道七十一州不申戶口外每嵗倚辦止於浙江東西宣歙淮南江西鄂嶽福建湖南八道四十九州一百四十四萬戶比天寶稅户四分減三天下兵仰給縣官者八十三萬餘人比天寶三分增一大率二户資一兵其水旱所傷非時調發不在此數通鑑至道元年六月詔復造天下郡國戶口版籍自唐末四方兵起版籍亡失故戶口稅賦莫得周知至是始命復造焉免役小司徒征役施舍見上鄉大夫國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍地官注云鄭司農云征之者給公上事也舍者謂有復除不收役事也疏云韓詩外傳二十行役與此國中七尺同則知七尺謂年二十六尺謂年十五論語云可以托六尺之孤鄭注六尺之孤年十五以下漢惠帝四年舉民孝弟力田者復其身本紀孝景二年禮髙年九十者一子不事八十者二算不事通典一子不事蠲其賦役二算不事免二口之算賦唐太皇太后皇太后皇后緦麻以上親內命內婦一品以上親郡王及五品以上祖父兄弟職事勳官三品以上有封者若縣男父子國子大學四門學生俊士孝子順孫義夫節婦同籍者皆免課役凡主戶內有課口者為課戶若老及男廢疾篤疾寡妻妾部曲客戶奴婢及視九品以上官不課唐志載師凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徵其賦地官鄭司農云國宅城中宅也宅不毛者謂不樹桑麻也故書漆林為漆林杜子春云當為漆林玄謂國宅凡官所有宫室吏所治者也國稅輕近而重逺近者多役也宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以供吉凶二服及喪器也民雖有間無職事者猶出夫稅家稅也夫稅者百畝之稅家稅者出士徒車輦給徭役折納角人掌以時徵齒角凡骨物於山澤之農以當邦賦之政令羽人掌以時徵羽翮之政於山澤之農以當邦賦之政令掌葛掌以時徵絺綌之材於山農以當邦賦之政令地官唐永徽中揚州租調以錢嶺南以米安南以絲益州以羅紬綾絹供春綵唐食貨志宋朝開寶八年詔紬絹不滿匹許納價錢慶厯六年詔諸路轉運司夏秋折變自今於未納半年前榜諭之鄉役鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人地官管仲制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉前漢十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼三老掌教化嗇夫職聽訟收賦稅遊徼徼循禁賊盜皆秦制也漢表丁齒內則三十始理男事鄭氏注謂受田給政役也禮記聖王量能授事四民陳力受職民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十二以上上所強也漢志漢景帝二年令天下男子年二十而始傅傅音付傅著也著名籍給公家徭役舊法二十三此二十更為異制大唐武德七年定令男女始生為黃四嵗為小十六為中二十一為丁六十為老神龍元年韋后求媚於人上表請天下百姓年二十二成丁五十八免役制從之韋庶人誅復舊玄宗天寶制十八以上為中男二十三以上成丁廣德元年制男子二十五成丁五十五老國朝丁齒太平興國九年江浙湖嶺令人戶以二十成丁六十八老支移秦始皇建守罷侯貴以自奉提封之內撮粟尺布一夫之役盡専於己徂春厯秋往還萬里是所得者至寡所苦者至大人用無聊海內咸怨舍地而稅人故地數未盈其稅必備是以貧者避賦役而逃逸富者務兼并而自若加以收大半之賦發閭左之戍竭天下之資財以奉其政由未足以瞻其欲也二世承之不變其失反更益之海內愁怨遂用潰畔通典唐太宗配租以斂穫早晚險易逺近為差庸調輸以八月發以九月同時輸者先逺民皆是槩量唐志慶厯六年二月詔諸路轉運司凡夏秋稅支移所變自今並於未起納半年前揭榜曉諭之漢興髙祖於是約法省禁輕田租什五而稅一量吏祿度官用以賦於民山川園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費師古曰言各收其所賦稅以自供不入國朝之倉稟府庫也經常也朝錯説漢文帝曰農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石方今之務莫若使民以粟為賞罰募天下入粟縣官得以拜爵得以除罪取於有餘以供上用則貧民之賦可損文帝從之乃下詔賜民十二年稅租之半明年遂除民田之租稅後十三嵗孝景二年令民半出田租三十而稅一也前漢食貨志雇役孝昭元鳳三年以前逋更賦未入者皆勿收通典更有三品有卒更有踐更有過更古者正卒無常皆當迭為之一月一更是為卒更也貧者欲得雇更錢次直者出錢雇之月二千是為踐更也天下之人皆直戍邊三日亦名為更律所為繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因作一嵗一更諸不行者出錢三百入官以給戍者是為過更也此漢初因秦法而行之也後遂改易有謫乃戍邊一嵗耳霍光知時務之要輕繇薄賦與民休息北齊文宣始立九等戶富者稅其錢貧者役其力通鑑楊繪言助役之法斂之多而行峻率其利而官取之東明等縣百姓千百人詣開封府訴超升等第出助役錢事本府不受遂入安石私第王莽篡位以周官稅民凡田不耕為不植出三夫之稅城郭中宅不樹藝者為不毛師古曰樹藝謂樹果木及菜蔬出三夫之布浮遊無事出夫布一匹其不能出布者冗作縣官衣食之諸取衆物及畜牧桑蠶百技商販坐肆除其本計其利十分之以其一為貢自占不以實者盡沒入所采取而作縣官一嵗賦斂民財十取五胸奴侵冦甚莽大募天下囚徒人奴名曰豬突豨許宣反勇一切稅吏民訾三十而取一民搖手觸禁不得耕桑徭役煩劇漢志戶調後漢孝獻帝建安五年汝南黃巾劉辟等叛曹操應袁紹陽安都尉李通録户調趙儼見通曰方今諸户並叛獨陽安懷附復趣收其綿絹小人樂亂無乃不可乎乃書與荀彧彧即白操悉以綿絹還民上下歡喜郡內遂安通鑑魏武帝初平袁氏以定鄴都令定田租畝粟四升户絹二匹綿二斤餘皆不得擅興藏強賦弱晉食貨志晉平吳之後制戶調之式丁男之户嵗輸絹三匹綿三斤女及次丁男為户者半輸晉武帝平吳之後詔天下罷軍役示海內大安州郡悉去兵大郡置武吏百人小郡五十人晉書山濤傳晉成帝季年權賦民男丁嵗三斛女丁半之疾病又半之戶調絹不過數丈綿數兩事少役希民多富實新附者皆給復除通鑑後魏天安以來比嵗旱飢重以青徐用兵山東之民疲於賦役顯祖命因民貧富為三等輸租之法等為九品千里內納粟千里外納米上三品輸平城中輸他州下輸本州又魏制常貢之外有雜調十五至獻文帝悉罷之由是民稍贍給通鑑及後魏志魏舊制户調帛二匹絮二斤絲一斤穀二十斛又人帛一匹二丈委之州庫以供調外之費所調各隨土之所出孝文泰和八年始班俸祿户增調帛三匹穀二斛九斗以為官司之祿增調外帛二匹通鑑齊武永明二年後魏無鄉黨之法惟立宗主督護民多隱冒三五十家始為一户孝文時內祕書令李沖上言宜準古法五家立鄰長五鄰立里長五里立黨長取鄉人強謹者為之鄰長復一夫里長二夫黨長三夫三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調五匹為調外費三匹為百官俸此外復有雜調民年八十以上者一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之書奏詔百官通議中書令鄭義等皆以為不可文明太后曰立三長則課調有常準苞蔭之户可出僥幸之人可止何為不可甲戌初立黨里鄰三長定民户籍通鑑齊武永明四年北齊舊制未娶者輸半床租調有妻者輸一床無者半床陽翟一郡户至數萬籍多無妻有司劾之帝不許由是姦欺尤甚戶口租調十亡六七河清三年定令乃率以十八受田輸租調二十充兵六十免力役六十六還田免租調率人一床調絹一匹綿八兩凡十斤綿中折一斤作絲墾租二石義租五斗奴婢準良人之半牛調二丈墾租一斗義租五升墾租送臺義租納郡以備水旱通典後周文帝霸府初開制司賦掌賦均之政令凡人自十八至六十四與輕疾者皆賦之其賦之法有室者嵗不過絹一匹綿八兩粟五斛丁者半之其非桑土有室者布一匹麻十斤丁者又半之豐年則全賦中年半之下年一之皆以時徵焉若艱凶札則不徵其賦司徒掌力役之政令凡人自十八至五十九皆任於役豐年不過三旬中年則二旬下年則一旬起徒役無過家一人通典隋文帝遷都發山東丁毁造宫室仍依周制役丁為十二畨匠則六畨丁男一床租粟三石桑土調以絹絁麻土調以布絹絁以匹加綿三兩布以端加麻三斤單丁及僕隸各半之有品爵及孝子順孫義夫節婦並免課役開皇三年減十二畨每嵗為三十日役減調絹一匹為二丈初蘇威父綽在西魏世以國用不足為征稅之法頗重既而歎曰今所為者正如張弓非平世法也後之君子誰能弛之威聞其言每以為己任至是威為納言奏減賦役務從輕典帝悉從之通典隋志云開皇三年令單人以二十成丁減十二畨每嵗為三十日役隋文帝仁夀四年詔復婦人及奴婢部曲之課通鑑租庸調唐髙祖武德二年初定租庸調法每丁租二石絹二匹綿三兩自兹以外不可橫斂若嶺南諸州則稅米上户一石二斗次户八斗下户六斗若蠻獠之户皆從半輸畨人內附者上户丁稅錢十文次户五文下戶免之附經二年者上户丁輸羊二口次户一口下户三户共一口武德七年初定均田租庸調法凡授田者丁嵗輸粟二斛稻三斛謂之租丁隨鄉所出嵗輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩調用之力嵗二十日閏加二日不役者日為絹三尺謂之庸有事而加役二十五日免謂水旱蟲霜為災什損四以上免租損六以上免調損七以上課役俱免凡民資業分為九等和糴唐玄宗開元二十五年先是西北邊數十州多宿重兵地租營田皆不能贍始用和糴之法有彭果者因牛仙客獻䇿請行糴法於關中戊子敕以嵗稔穀賤傷農命增時價什二三和糴東西畿粟各數百斛停今年江淮所運租自是關中蓄積羡溢車駕不復幸東都通鑑憲宗即位之初畿內和糴當時府縣配户督限有稽違則迫蹙鞭撻甚於稅賦號為和糴其實害民唐志兩稅德宗建中元年始用楊炎議命黜陟使與觀察使刺史約與百姓丁産定等級作兩稅法比來新舊徵科色目一切罷之二稅外輒率一錢者以枉法論唐初賦斂之法曰租庸調有田則有租有身則有庸有户則有調玄宗之末版籍浸壞多非其實及至德宗起兵所在賦斂迫趣取辦無復常凖賦斂之司增數而莫相統攝各隨意徵科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上户優而下户勞吏因緣蠶食民旬輸月送不勝困弊率皆逃徙為浮户其土著百無四五至是炎建議作兩稅法先計州縣每嵗所應費用及上供之數而賦於人量出以制入户無主客以見居為簿人無中丁以貧富為差為行商者在所州縣稅三十之一使與居者均無僥利居人之稅夏稅六月內納畢秋稅十一月內納畢其租庸調雜徭悉省皆總統於度支上用其言因赦命行之通鑑兩稅嵗斂錢二千五十餘萬緡米四百萬斛以供外錢九百五十餘萬緡米千六百餘萬斛以供京師憲宗元和三年上嘗問户部侍郎裴垍為理之要何先對曰先正其心舊制民輸稅有三一曰上供二曰送使三曰留州建中初定兩稅時貨重錢輕是後貨輕錢重民所出已倍其初其留州送使者所在又降省估就實估以重斂於民及垍為相奏天下留州送使物請一切用省估通鑑凡租稅有穀有帛有金鐵有物産為四類穀之品七曰粟曰稻曰麥曰黍曰穄曰菽曰雜子帛之品十曰羅曰綾曰絹曰紗曰絁曰紬曰雜折曰絲曰綿曰布褐金鐵之品四曰金曰銀曰鐵鑞曰銅鐵錢物之産品六曰畜曰齒革翎毛曰茶鹽曰竹木雜草芻菜曰果藥油紙薪炭漆蠟曰雜物詳説賦役之制自禹貢始可見禹貢既定九州之田賦以九州之土地為九州之土貢説者以謂有九州之土貢然後田賦之所當供者市易所貢之物考之於經蓋自有證何者甸服百里賦納總至於五百里米自五百里之外其餘四服米不運之京師必以所當輸者上貢於天子以此知當時貢賦一事所以冀州在王畿甸服之內全不敘土貢正緣已輸粟米以此相參考亦自有證蓋當時寓兵於農所謂貢賦不過郊廟賔客之奉都無養兵之費故取之於畿甸而足自大略而言之三代皆沿此制夏后氏五十而貢商人七十而助周人百畝而徹三代之賦略相當周官所載九畿之貢而已九州之貢所謂出者半或三之一或四之一或以半輸王府或以三之一輸王府或以四之一輸王府所謂土貢未必能當貢賦之半留之於諸侯之國以待王室之用皆是三代經常之法所謂弼成五服至於五千州有十二師説者以為二千五百人為師亦是一時權時之役所謂經常之役用民之力嵗不過三日豳詩所謂我稼既同上入執公功皆是經常之役法如此用兵軍役寓之井賦乘馬之法無事則為農有事則徵役孟子所謂有力役之征有布縷之征有粟米之征當時賦役之征三句該盡且以三代以前布縷之征考之在周官九職所謂嬪婦化治絲枲布縷之征亦略可見自周至唐兩稅未變之前取於民者不過三事至漢所謂材官踐更過更卒更三等之制當時有干戈之征便是孟子所謂力役之征及至魏晉有户調之名凡有戶者出布帛有田者出租賦當時有户調之名役法尚存古制但日新漸增至南北朝增三代之三日至於四十五日自漢至南北朝賦役經常之法如此至唐髙祖總括厯代之政立租庸之法租者乃孟子所謂粟米之征調者乃孟子所謂布縷之征由漢以來所謂户調有家則有調後魏亦謂之户調在後魏以一夫一婦出帛一匹在北齊則有一床半床之制已娶者則一床未娶者則半床此是租庸也庸者乃孟子所謂力役之征前代有事則用民力無事則休息至唐則算無事不役之時減一嵗作一十五日計日輸而所謂有身則有役唐髙祖庸調之法承習三代漢魏南北之制雖或輕或重要之規摹尚不失舊德宗時楊炎為相以户籍隱漏徵求煩多變而為兩稅之法兩稅之法既立三代之制皆不復見然而兩稅在德宗一時之間雖號為整辦然取大厯中科徭最多以為數雖曰自所稅之外並不取之於民其後如間架如借商如除陌取於民者不一楊炎所以為千古之罪人何以言之兩稅未立之前非無暴君汚吏所謂汚吏尚有經常有權時然而分外不過一時橫斂斂之重者無如王莽計本取息十分之一役之多者無如隋煬帝開汴河民八百萬不過權時如此經常正法元不曾動有王者作經常之制自吾復古楊炎併兩稅之後經常權時混為一區有王者作無所取證而經常權時者皆在其中民力安得不重因楊炎之變古亂常所以為千古之罪人大抵田制雖商鞅亂之於戰國而租稅由有厯代之典制惟兩稅之法立古制然後掃地賦役之略如此大抵賦役之法其根本一見於戶籍丁數若户丁産不定雖有良法美意亦無自而行三代之時所謂田皆在官之田所謂民年三十受田六十歸田所謂人户始生閭史書之是時賦役之法無緣進退得自井田變而為阡陌占田無限户之髙下田之多少得以為姦雖一時為治者如髙熲之在隋盡括隱丁隋之富強自漢以來莫及宇文融之括隱户賸田阡陌之害流弊於無窮大抵租庸調之法自漢以來固是或輕或重然而先王之制尚有存而可見者唐髙祖於四十五日之役減其大半然自是又添一個庸至安祿山暴賦橫斂一時所取大厯之間租庸調之法雖行法者非其人似若有弊然而法元不曾改自楊炎相德宗考之當時固當通變之可惜趣辦一時非久經之制今所編備具須先識以萬民惟正之供經常之制王者所當用一時之權蓋出於不得已之制然而賦役之制要得復古田制不定縱節用薄斂如漢文帝之復田租荀悅論豪民收民之資惟能惠有田之民不能惠無田之民田制不定雖欲復古其道無由兵制不復古民既出稅賦又出養兵之費上之人雖欲權減兵又不可不養兵制不定此意亦無由而成要之寓兵於農賦役方始定若論井田乘馬之法固難卒行如限民名田之制府兵之制有意於為政者皆可以漸復何故限民名田使其上下受田各有數亦可自此復井田之法府兵之制出於農有事則征役無事則散歸田野如此則兵乘之法亦須簡易然後可行且如唐制口分世業其法煩碎雖非民田之制自永業之外人於其間有二十畝使之賣買合參井田之制未幾人得以賣以此知法須求簡易厯代制度詳説卷三
