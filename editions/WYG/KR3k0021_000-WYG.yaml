body:
  text: 御題歴代制度詳説中原文獻有家模講學還從張與朱酌古準今列條目鎔經鑄史示師謨詎寧考据資談柄欲見施行洽化樞昔未羶薌後知重吁嗟此弊那能無欽定四庫全書子部十一厯代制度詳說類書類提要臣等謹案厯代制度詳說十二卷宋吕祖謙撰祖謙有古周易已著録此書凡分十三門一曰科目二曰學校第三門原本闕頁佚其標題所言乃考課之事四曰賦役五曰漕運六曰鹽法七曰酒禁八曰錢幣九曰荒政十曰田制十一曰屯田十二曰兵制十三曰馬政皆前列制度敘述簡賅後為詳明議論明切元泰定三年嘗刋行前有廬陵彭飛序稱為祖謙未竟之書故止於此其或然歟刋板乆佚此本輾轉傳寫又多訛缺其錢幣門中脱二頁荒政門中脱二頁今悉據通典所引補足中間誤字亦考核校正惟第二卷脱去標題之數頁則無可檢補姑仍其舊飛序稱紫陽浙學功利之論其意盖有所指永嘉諸君子未免致疵議焉祖謙以中原文字之舊巋然為渡江後大宗紫陽倡道東南祖謙實羽翼之性命道徳之原講之已洽而尤潛心於史學似欲合永嘉紫陽而一之云云盖有元中葉新安之學盛行飛恐人執朱子之論薄視此書故作是言也考祖謙年譜不載此書葢採輯事類以偹答䇿本家塾私課之本其後轉相傳録遂以付梓原非特著一編欲以立教與講學别為一事各不相蒙所謂言豈一端各有當也飛必牽合調停與葉盛水東日記必謂文章闗鍵為亦講學之一端者同一迂陋㕘同契隂符經朱子皆有論著飛亦將謂欲合孔孟黄老而一之乎乾隆四十一年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀厯代制度詳説原序天下無道外之事事外之道禮典命討皋陶以歸之天為天下國家有九經王天下有三重子思子以本之至誠之道其揆一也自性理之説興世之學者歧道學政事為兩途孰知程朱所以上接孔孟者豈皆托之空言不如載之行事之深切著明也紫陽夫子浙學功利之論其意蓋有所指永嘉諸君子未免致疵議焉東萊先生以中原文獻之舊巋然為渡江後大宗紫陽唱道東南先生實羽翼之故凡性命道徳之源講之已洽而先生尤潛心於史學似欲合永嘉紫陽而一之也嗚呼先生宏綱大用既未得施於當時所著制度詳説又弗及竟於古今沿革之制世道通變之宜貫穿折衷首尾備見鑿鑿如桑麻穀粟切於民生實用有不容闕者焉空虚華靡之學日勝斵喪學者心術至於浮淫壊爛之極先生此書寖鬱而不彰則其用心之苦亦可悲矣科復䇿興書肆板而行之使讀者知窮經以立其本涉史以通其變研究事理以觀其會通然後見天下果無道外之事事外之道而古人窮理經世之學蓋如此豈徒以資時文之楦具也哉泰定三年丙寅夏五後學廬陵北山彭飛謹書
