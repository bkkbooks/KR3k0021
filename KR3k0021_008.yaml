body:
  text: 厯代制度詳説卷八宋吕祖謙撰荒政制度飢旱帝曰棄黎民阻飢汝后稷播時百穀禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷奏庶艱食鮮食並虞書禹十年水湯七年旱而天下無菜色者十年之後穀復收熟而陳積有餘荀子禱旱湯旱而禱曰政不節與使民疾與何以不雨至斯極也宫室崇與婦謁盛與何以不雨至斯極也苞苴行與讒夫興與何以不雨至斯極也荀子宣王承厲王之烈遇災而懼側身修行欲消去之天下喜於王化復行百姓見憂詩雲漢序蠲放太宰以九式均節財用三曰喪荒之式式謂用財之節度小宰以官府之六聨合邦治三曰喪荒之聨事六曰斂弛之聨事天官謂荒政弛力役均人掌均力政凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦不收地守地職不均地政地官不收山澤及地稅亦不平計地稅也非凶札之嵗當收稅乃均之耳地守虞衡之屬地職農圃之屬漢文帝後六年夏大旱蝗弛山澤本紀宣帝本始三年旱後漢章帝元年旱唐太宗貞觀元年旱玄宗開元八年水旱憲宗元年九年旱並免租稅東晉元帝大興二年蝗飢詔去非急之務南齊髙帝建元中詔三吳遭水減田租梁武大同五年詔南兖等州飢放逋租宿債南史唐髙祖武德七年初均田租庸調法水旱蟲霜為災十損四以上免租損六以上免調損七以上課役俱免通鑑唐志水旱耗十之四者免其租桑麻盡者免其調田耗十之六者免租調耗七者諸役皆免降損膳夫掌王之食飲膳羞大荒則不舉大禮則不舉天官嵗凶年穀不登君膳不祭肺禮食殺牲則祭先周人以肺不祭肺則不殺也馬不食穀馳道不除祭祀不縣縣樂器鐘磬之屬也大夫不食梁士飲酒不樂曲禮下漢文帝六年大旱蝗令諸侯無入貢賦減諸服御損郎吏員本紀宣帝本始二年唐太宗貞觀元年並以嵗飢減膳十二政大司徒以荒政十有二聚萬民一曰散利二曰薄徵三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊大荒大札疫病也則令邦國移民通財舍禁弛力薄徵緩刑地官賑恤荒政一曰散利見上小行人若國札喪則令賻補之若國凶荒則令賙委之秋官漢文帝後六年大旱蝗發倉庾以賑民武帝元狩三年開郡國倉廩以賑民梁武建武六年水旱令郡國廩給明帝永平十六年旱詔賜粟太宗貞觀元年遣使賑飢玄宗開元二十八年詔給不待報緩刑荒政三曰緩刑見上士師若邦凶荒則以荒辨鄭司農云辨讀為别救荒之政十有二而士師别受其教條元謂辨當為貶遭飢荒則刑罰國事有所貶損作權時法也之法治之糾守糾守備盜賊也緩刑後漢明帝永平十八年詔春旱理寃獄録輕繫章帝建初三年以旱理寃獄録輕繫唐太宗貞觀三年以旱慮囚玄宗開元二年以旱慮囚流移大司徒令邦國移民移民備災就穀見上廩人凡萬民之食食者人四釜上也人三釜中也人二釜下也此皆謂一月食米也六斗四升曰釜若食不能人二釜則令邦移民就穀地官漢髙帝令飢民就食蜀漢武帝元狩三年山東水令民就食江淮又徙貧民於關以西及充朔方以南新秦中七十餘萬口衣食皆仰給縣官後漢章帝建初八年詔牛疫民徙者聽移用大司徒通財見上士師若邦凶荒令移民通財漢武帝元鼎二年詔曰今水潦移於江南方下巴蜀之粟致之江陵宣帝本始四年嵗不登民以車船載穀入關毋得用傳並本紀唐玄宗開元二年禁閉糴備荒遺人掌縣都之委積以待凶荒地官少曰委多曰積倉人掌粟入之藏有餘則藏之以待凶嵗而頒之地官三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色王制漢賈誼説文帝曰積貯者天下之大命也今驅民而歸之農皆著其本使天下各食其力末技遊食之民轉而緣南畝則蓄積多而人樂其所矣上感誼言詔開籍田躬耕以勸百姓漢志漢文帝十二年朝錯言募天下入粟縣官得以拜爵除罪漢志董仲舒説武帝詔關中種宿麥漢本紀元符三年遣謁者勸有水災郡種宿麥疾疫司救凡嵗時有天患民病則以節巡國中及郊野而以王命施惠地官司市國凶荒札喪則市無徵而作布地官金銅無凶年因物貴大鑄錢以饒民漢武帝元狩四年有司言徙關東貧民用度不足請收銀錫造白金及皮幣以足用漢宣帝元康二年詔天下疾疫令毋出今年租並漢書火災大宗伯以禬禮哀圍敗春官同盟者會合財貨以更其所喪春秋襄三十年冬會于澶淵宋災故是其類大行人致禬以補諸侯之災秋官漢章帝建初六年廉范遷蜀郡太守舊制禁民夜作防火災范但嚴使儲水而已百姓以為便通鑑本傳水災漢成帝河平四年遣光祿大夫博士嘉等行舉瀕河之郡水所毁傷振貸給槥櫝葬埋已葬與錢二千避水他郡國所在食之借貸甫田我取其陳食我農人自古有年周小雅箋云倉廩有餘民得賒貰取食之所以紓官之蓄滯漢宣帝本始四年詔曰今嵗不登遣使者振貸困乏丞相以下入穀助貸貧民本紀捕蝗大田去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火周小雅食心曰螟食葉曰螣食根曰蟊食節曰賊箋此四蟲者常害田中之稚禾唐太宗貞觀二年吞蝗曰朕為民受災何疾之避通鑑唐書玄宗開元二年大蝗姚崇奏遣御史督州縣捕而瘞之勸分魯僖公三十一年夏大旱欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分有無相濟此其務也漢武帝元狩二年渾邪等降縣官費衆貧民大徙無以盡贍卜式持錢三十萬與河南太守以給徙民上乃召拜式為中郎以風百姓卜式傳平糴管仲相威公通輕重之權曰嵗有凶穰故穀有貴賤令有緩急故物有輕重民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時則準平使萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘耒耜器械種餉糧食必取贍焉故大賈蓄家不得豪奪吾民矣漢志威公問管子曰終身有天下而勿失有道乎對曰守國者守穀而已某縣之壤廣若干某縣之壤狹若干則必積委幣委蓄也各於州縣里蓄積錢幣所謂萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬於是州縣里受公錢公錢即委積之幣秋國穀去三之一去減也丘吕切君下令謂郡縣屬大夫里邑皆藉粟入若干穀重一也以藏於上者一其穀價而收藏之國穀三分則二分在上矣言先貯幣於郡邑當秋時下令收糴也則魏李悝行平糴之法蓋出於此今言去三之一者約中熟為準耳魏李悝為魏文侯作盡地力之教曰糴甚貴傷民謂士工商也甚賤傷農善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石上嵗百畝收百五十石今大熟四倍收六百石計民食終嵗長四百石官糴三百石此為糴三捨一也中熟自三餘三百石自三四百五十石也終嵗長三百石官糴二百石此為糴二而捨一也下熟自倍餘百石自倍收三百石終嵗長百石官糴其五十石云下熟糴一謂中分百石之一小飢則收百石平嵗百畝之收百五十石今小飢收百石收三分之二也中飢七十石收二分之一大飢三十石收五分之一故大熟則上糴三而捨一中熟則糴二下熟則糴一使民適足價平則止小飢則發小熟之所斂中飢則發中熟之所斂大飢則發大熟之所斂而糶之故雖遇飢饉水旱糴不貴而民不散取有餘而補不足也行之魏國國以富強並漢志常平漢宣帝五鳳四年五月大司農中丞耿夀昌請令邊郡皆築倉以穀賤時增其價而糴以利農穀貴時減價而糶名曰常平倉以給北邊省轉漕民便之漢志元帝初元五年罷後漢明帝永平五年置晉武帝大始二年立後魏大和二十年置隋文帝開皇三年陜州置唐髙祖武德元年置常平監五年廢太宗貞觀十三年於洛陽相幽徐齊并秦蒲州置髙宗永徽六年京東西市置玄宗開元七年敕關內隴右河南河北五道及荆揚襄益州並置德宗建中元年趙贊請於兩都江陵城成都揚汴蘇洪置納其䇿宋朝淳化三年置景德三年秋京西河北河東陜西淮南兩浙置天僖四年詔益梓利夔州荆湖南北廣東西南路並置唐天寶八載天下常平置四百六十萬二千二百二十石廣惠倉嘉祐三年詔置天下廣惠倉初樞密院使韓琦請罷鬻諸路户絶田募人承佃以夏秋所輸之課給在城老幼疾病之不能自存者既建倉仍詔逐路提點刑獄司専領之嵗終其所輸納上三司十萬户以上留一萬石七萬户八千石五萬户六千石三萬户四千石二萬户三千石萬户二千石不滿萬户一千石有餘則許鬻之熙寧二年廣惠倉轉易散青苗四年詔賣廣惠倉田青苗熙寧二年制置三司條例司言乞令河北京東淮西轉運司施行常平廣惠倉出納及預散之法廣惠倉斛斗除依條合支老疾乞丐人據數量留其餘並令常平倉監官通管一般轉易其兩倉見錢依陜西出俵青苗錢例每於夏秋未熟以前召人户請領令隨稅送納斛斗內有願請本色斛斗或納時價貴願納見錢皆聽仍於京東淮南河西三路先行此法措置熙寧三年詔極邊罷散支青苗錢義倉北齊制每人出懇租二石義租五斗懇租送臺義租納郡以備水旱河清中令諸州郡皆别置富人倉初立之日準所領中下户口數得一年之糧逐當州穀價賤時斟量割當年義租充入穀貴下價糶之賤則還用所糶之物依價糴貯隋開皇五年詔州縣置唐髙祖武德元年置社倉太宗貞觀二年立玄宗開元二十五年定立畝稅二升以為義倉德宗時韋倫請為義倉宋朝建隆四年詔州縣置乾德四年罷慶厯元年立五年罷熙寧二年並廢唐天寶八載天下義倉六千三百一十七萬七千六百六十石惠民倉淳化二年令諸州惠民倉遇糴稍貴減價以糶貧民每人不過一斛咸平二年於福建置蔽匿後漢殤帝延平元年敕郡國水旱覆蔽災害今後將糾其罰本紀晉張駿境內飢穀貴談詳請出穀與百姓秋徵三倍隂據諫不可因人之飢以要三倍唐貞元十四年民請蠲租京兆尹韓皋府帑已空奏不取實事聞貶撫州司馬十九年李實言今嵗雖旱而禾苗甚美由是租稅皆不免韓愈上疏以京畿百姓窮困應今年稅錢請俟來年麥蠶愈坐貶咸通十年陜民訴旱觀察使崔蕘指庭樹曰此尚有葉何旱之有杖之民怒故作亂逐蕘杜悰鎮淮南時旱民至漉漕渠遺米自給取陂澤茭蒲實皆盡悰更表以為祥由是罷免代宗大厯十二年秋霖損稼渭南令劉澡稱縣境苗獨不損上曰霖雨溥博豈特渭南獨無更命御史朱殷視之損三千餘頃上嘆曰縣令字人之官不損猶應言損乃不仁如是乎貶澡南浦尉通鑑德宗貞元八年河南北江淮等州大水陸贄請遣使賑撫上曰聞所損殊少贄奏曰流俗多徇諂諛揣所悅意則侈其言度所惡聞則小其事制備失所常病於斯又曰所費者財用所收者人心通鑑憲宗元和七年上謂宰相曰卿輩屢言淮浙去嵗水旱近有御史自彼還言不至為災李絳對曰御史欲為姦諛以悅上意耳上曰國以人為本聞有災當急救之豈可復疑之耶命速蠲其租通鑑不賑救唐太宗謂王圭曰隋開皇十四年大旱文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年煬帝恃其富饒侈心無厭卒亡天下通鑑隋煬帝大業二年置洛口倉於鞏東南原上築倉穿三千窖窖八千石置回洛倉於洛陽北穿三百窖大業十二年民飢吏皆畏法莫敢賑救李密襲興洛倉破之開倉恣民所取老弱襁負道路相屬總編賑救小行人禮喪凶荒厄貧一書每國辨異之以反命於王秋官古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也衛詩有狐王莽末年民愈貧困常苦枯旱穀價翔貴北邊及青徐地人相食雒陽以東米石二千莽遣三公將軍開東方諸倉賑貸窮乏分遣大夫謁者教民煮木為酪酪不可食流民入關者數十萬人置養贍宫以廩之吏盜其廩飢死者十七八光武建武七年詔往嵗水旱人用困乏命郡國有穀者給廩二千石勉加撫循無令失職本紀後漢桓帝永興二年詔五穀不登其令所傷郡國種蕪菁以助人窘本紀魏文帝黃初三年冀州蝗民飢使杜畿開倉賑之孫權赤烏二年民飢詔開倉廩賑之晉武帝泰始五年青徐兖州水遣使賑恤晉惠帝永熙八年關中飢洛陽天水等六郡民流移就穀入漢川者數萬家推李特行鎮北大將軍入據廣漢通鑑後魏孝文太和十一年大旱牛疫有以馬驢及槖駝供耕詔聽民就豐行者十五六道路給糧至所在三長古者五家立鄰長五鄰立一里長五里立一黨長贍養之後魏志宋文帝元嘉十二年水以米穀賜五郡北齊文宣帝乾明元年詔河南等九州蟲水傷稼遣使賑恤後周司倉掌辨九穀之物以量國用足蓄其餘以待凶荒不足則止餘用通典陳文帝天嘉五年令民送義租納郡以備水旱唐太宗貞觀元年關中飢米斗直絹一匹二年天下蝗三年大水上勤而撫之未嘗嗟怨是嵗天下大稔流散者咸歸鄉里米斗不過三四錢通鑑四年髙宗儀鳳二年詔以河南北旱遣御史中丞崔謐等分道存問賑給侍御史劉思立上疏以為今麥秀蠶老農事方殷敕賜撫巡人皆竦忭忘其家業冀此大恩聚集參迎妨廢不少既緣賑給頒立簿書本欲使安存更成煩擾望且委州縣賑給待秋深務間出使褒貶疏奏謐等遂不行通鑑富鄭公自鄆移青會河朔大水民流京東公以為從來賑救當聚之州縣人既猥多倉廩不能供散以粥飯欺弊百端由此人多餓死死者氣薰蒸疾疫隨起居人亦致病斃是時方春野有青菜公出榜要路令飢民散入村落擇所部豐稔者三州勸民出粟得十五萬斛益以官廩隨所在貯之各因坊村擇寺廟及公私空屋又因山巖為構屋以處流民富民不得陂澤之利分遣寄居間官往主其事間有健吏募流民中曾有為吏胥走𨽻者皆給其食令供簿書給納守禦之役借民倉以貯擇地為場掘溝為限與流民約三日一支出納之詳亦如官府公推其法於境內吏之所至手書酒炙之饋日至人人欣戴為之盡力比麥熟人給路糧遣歸餓死者無幾為大冢葬之謂之業冢其間強壯堪為禁卒者募數千人奏乞撥充諸軍自是天下流民處多以青州為法詳説荒政條目始見於黎民阻飢舜命棄為后稷播時百穀其詳見於生民之詩到得後來如所謂禹之水湯之旱民無菜色其荒政制度不可考及至成周自大司徒以荒政十有二聚萬民其詳又始錯見於六官之書然古者之所謂荒政以三十年之通制國用則有九年之蓄遇嵗有不登為人主者則貶損減省喪荒之式見於小行人之官禮喪凶荒厄窮為一書當時天下各自有廩藏所遇凶荒則賑發濟民而已當時措置與後世不同所謂移民平糴皆後世措置且自周論之太宰以九式均節財用三曰喪荒之式又遺人掌縣都之委積以待凶荒而大司徒又以薄征散利凡諸侯莫不有委積以待凶荒凶荒之嵗為符信發粟賑飢而已當時斂散輕重之式未嘗備侯甸男衛皆有饋遺不至於穀價翔踊如弛張斂散之權亦不須講惟到春秋戰國王政既衰秦飢乞糴於晉魯飢乞糴於齊嵗一不登則乞糴於鄰國所謂九年之制度已自敗壞管子輕重一篇無慮千百言不過君民互相攘奪收其權於君上已非君道所謂荒政一變為斂散輕重先王之制因壞到後來斂散輕重之權又不能操所以啓姦民幸凶年以謀禍害民轉死於溝壑至此一切急迫之政五代括民粟不出粟者死與斂散輕重之法又殆數等大抵其法愈壞則其術愈粗論荒政古今不同且如移民易粟孟子特指為茍且之政已非所以為王道秦漢以下却謂之善政漢武帝詔令水潦移於江南方下巴蜀之粟致之江陵唐西都至嵗不登關中之粟不足以供萬乘荒年則幸東都自髙祖至於明皇不特移民就粟其在髙宗時且有逐糧天子之語後來玄宗溺於可安不出長安以此論之時節不同孟子所謂茍且之政乃後世所謂善政且三十年之通制國用須必世百年而可行亦未易及此後之有志之士如李悝之平糴法雖非先王之政豐年收之甚賤凶年出之賑飢此又思其次之良規到得平糴之政不講用一切趣辦之政君子不幸遇凶荒之年不得已而講求要之非常行按此篇自要之非常行句下原本全脫今依文獻通考補正使常糴之法常行則穀價不貴四民各安其居不至於流散各可以自生養至於移民移粟不過以飢殍之養養之而已若設糜粥其䇿又其下者大抵荒政統而論之先王有預備之政上也使李悝之政修次也所在蓄積有可均處使之流通移民移粟又次也咸無焉設糜粥最下也雖然如此各有差等有志之士隨時理會便其民戰國之時要論三十年之通計此亦虛談則可以行平糴之法如漢唐坐視無策則移民通財雖不及先王亦不得不論又不得已而為糜粥之養隨所寓之時就上面措置得有法亦可大抵論荒政體統如此今則所論可行者甚多試舉六七條且如漢載粟入關中無用傳後來販粟者免稅此亦可行之法此法一行米粟流通如後世勸民出粟散在鄉里以田里之民令豪户各出穀散而與之此一條亦可行又如富鄭公在青州處流民於城外所謂室廬措置種種有法當時寄居遊士分掌其事不以吏胥與於其間又如趙清獻公在會稽不減穀價四方商賈輻輳此一條亦是可行之法凡六七條皆近時可舉而行者自此推之不止六七條亦見厯世大綱須要參酌其宜於今者大抵天下事雖古今不同可行之法古人皆施用得遍了今但則舉而措之而已今所論荒政如平糴之政條目尤須講求自李悝平糴至漢耿夀昌為常平倉元帝以後或廢或罷到宋朝遂為定制仁宗之世漢魏公請罷鬻沒官之田募人承佃為廣惠倉散與鰥寡孤獨慶厯嘉祐間既有常平倉又有廣惠廣濟倉賑恤所以仁宗德澤洽於民三倉蓋有力至王荆公用事常平廣惠量可以支給盡糶轉以為錢變而為青苗取三分之息百姓遂不聊生廣惠之田賣盡雖得一時之利要之竟無根柢元祐間雖復章惇又繼之三倉又壞論荒政者不得不詳考厯代制度詳説卷八
