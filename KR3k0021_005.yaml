body:
  text: 厯代制度詳説卷五宋吕祖謙撰鹽法制度東海鹽青州厥貢鹽絺禹貢絺細葛管子曰齊有渠展之鹽唐青楚海滄棣等州以鹽價市輕貨亦輸司農食貨志形名籩人掌朝事之籩其實形鹽天官鄭司農云築鹽以為虎形𤣥謂鹽之似虎者唐貞元十六年史牟有斷澤潞等州末鹽元和六年盧坦奏河中兩池顆鹽放入六州界陶隠居云五味之中唯此不可闕有東海北海鹽及河東海鹽梁益鹽井交廣有南海鹽西羌有山鹽湖中有水鹽而色類不同以河東者為勝東海鹽官鹽白草粒細北海鹽黄草粒麄以作魚鮓及鹹葅乃言北勝而藏繭必用鹽官者蜀中鹽少淡廣州鹽鹹河東鹽池鹽人掌鹽之政令以供百事之鹽祭祀共其苦鹽散鹽史記索隠曰杜子春讀苦為盬一説云盬鹽河東大鹽賔客供其形鹽散鹽王之膳羞共飴鹽后及世子亦如之凡齊事鬻盬上音煑下音古以待戒令天官杜子春讀苦為盬謂出鹽直用不煉者鄭司農云散鹽煉治者𤣥謂散鹽鬻水為鹽形鹽鹽之似虎形飴鹽鹽之恬者今戎鹽有馬正義云戎鹽即石鹽是也漢章帝元和三年帝幸安邑觀鹽池通鑑唐蒲州安邑解縣有池五總曰兩池嵗得萬斛以供京師食貨志唐末兩池為河中節度使王重榮所有嵗貢鹽三千車中官田令孜募新軍五十四都運轉不足仍倡議兩池復歸鹽鐵使而重榮不奉詔至舉兵反僖宗為再出然而卒不能奪食貨志大中祥符九年陜西轉運副使張象中言安邑解縣兩池見貯鹽三千二百七十二籮計三億八千八百八十萬八千九百二十八斤計直二千一百七十六萬一千八十貫切盧尚有遺利望行條約帝曰地財之阜此亦至矣若過求增羨慮有時而闕不可許也北海鹽職方氏東北曰幽州其利魚鹽夏官唐幽州大同横野軍有鹽屯每屯有丁有兵嵗得鹽二千八百斛下者千五百斛負海州嵗免租為鹽二萬斛以輸司農食貨志榷鹽管子曰海王之國海王者言以負海之利而王其業王於況反謹正鹽筴十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半大女食鹽三升少半吾子食鹽二升少半吾子謂小男小女也此其大厯也鹽百升為釜鹽十二兩七銖二黍十分之一為升當米六合四勺也百升之鹽七十六斤十二兩十九銖二纍為釜當米六斗四升今鹽之重升加分强釜五十也分强半强也今使鹽官税其鹽之重每一斗加半合為强而取之則一釜之鹽得五十合而謂之强升口力一强釜百也升加二强釜二百也鍾二千十釡之鹽七百六十八斤為鍾當米六斛四斗是也十鍾二萬百鍾二十萬千鍾二百萬萬乗之國人數開口千萬也開口謂大男大女之所食鹽也禺筴之商日二百萬禺讀為偶偶對也商計也對其大男大女食鹽者之口數而立筴以計所税之鹽一日計二百萬合為二百鍾十日二千萬一月六千萬萬乗之國九百萬也萬乗之國大男大女食鹽者千萬人而税之鹽一日二百鍾十日二千鍾一月六千鍾也今又施其税數以千萬人如九百萬人之數則所税之鹽一日百八十鍾十日千八百鍾一月五千四百鍾月人三十錢之籍為錢三千萬又變其五千四百鍾之鹽而籍其錢計一月每人人籍錢三十凡千萬人為錢三萬萬矣以此籍之數而比其常籍則當一國而有三千萬人矣使君施令曰吾将籍於諸君諸君謂老男老女也六十已上謂老男五十以上謂老女吾子則必囂號令天給之鹽筴則百倍歸於上人無以避此者數也秦改帝王之制田租口賦鹽鐵之利二十倍於古漢興循而未改鹽鐵宜皆歸於民食貨志董仲舒説武帝漢武帝即位兵連不解縣官大空而富商大賈鬻鹽財或累萬金而不佐公家之急於是更造錢幣以摧并兼之徒以東郭咸陽孔僅為大農丞領鹽鐵事時桑𢎞羊貴幸咸陽齊之大鬻鹽故三人言利事析秋毫矣大農上鹽鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作鬻鹽官與牢盆蘇林曰牢價直也如淳曰牢廩食也古者名廩為牢牢蓋鬻鹽盆也浮食奇民欲擅管山海之貨以致富羨役利細民其沮事之議不可勝聴敢私鑄鐵器鬻鹽者􅎂左趾使僅咸陽乗傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏吏益多賈人矣食貨志元封元年桑𢎞羊為治粟都尉領大農盡代僅斡天下鹽鐵置大農部丞數十人分部主郡國各往往均輸鹽鐵官食貨志漢昭帝元始六年問賢良以民所疾苦皆對願罷鹽鐵桑𢎞羊言異時鹽鐵未籠布衣有朐邴人君有吳王専山澤之饒以成私威文學云昔文帝之時無鹽鐵之利而人富當今有之而百姓困乏於是丞相奏賢良不明縣官事猥以鹽鐵為不便宜罷榷酤奏可通典漢元帝時嘗罷鹽鐵官三年而復之漢志王莽下詔曰夫鹽食肴之将非編戸齊民所能家作必仰於市雖貴數倍不得不買豪民富賈即要貧弱先聖知其然也故斡之為設科條防禁犯者罪至死食貨志後漢章帝建初八年尚書張林上言縣官經用不足宜自煑鹽朱暉執以為不可曰鹽利歸官則下民窮怨誠非明主所宜行帝因發怒切責諸尚書暉等皆繫三日詔赦出之帝意解寢其事通鑑陳文帝天嘉二年太子中庶子虞荔御史中丞孔奐以國用不足奏立煑海鹽税從之通典隋文帝開皇三年先是尚依周末之弊收利鹽池鹽井皆禁百姓採用至是罷鹽池鹽井與百姓共之逺近大悦食貨志唐肅宗時第五琦作榷鹽法用以饒通鑑唐戸部侍郎張平叔議榷鹽法弊請糶鹽可以富國詔公卿議其可否中書舍人韋處厚兵部侍郎韓愈條詰之云百姓有見錢糴鹽者十無二三多用雜物及米穀博易鹽商利歸於已無物不取或從賒貸升斗約以時熟填還用此取濟兩得利便今令州縣人吏坐鋪自糶利不關已罪則加身不得見錢及頭段物恐失官利必不敢糶國家榷鹽糶與商人商人納榷糶與百姓則天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也唐志韓文唐有鹽池十八井六百四十皆制度也食貨志雍熙二年詔去年有司請通行江浙鹽商蓋欲通利於民如聞罷榷之後重擾於民宜仍舊貫會要至道二年十一月西京作坊使揚允恭言淮南十八州軍其九禁鹽餘商人由海上販鹽官倍數而取之至禁鹽地則上下其價民利商鹽之賤故販者益衆至有持兵器往來為盜者且行法宜一令請悉禁官遣吏主之詔知制誥張秉與鹽鐵使陳恕等會議恕等言其不可允恭再三為請乃從之是嵗收利巨萬會要西夏鹽唐鹽州五原有烏池白池瓦池細項池靈州有温泉池兩井池長尾池五泉池紅桃池回樂池洪静池會州有河池三州皆輸米以代鹽食貨志慶厯四年韓琦田況言西賊欲每年入中青鹽十萬自來㳂邊屬户以青鹽價錢賤而味甘故食解鹽者殊少邊臣多務寛其禁惟漢户犯者主配𨽻之刑曾無虚月今若許入中青鹽則㳂邊盡食西界青鹽無由禁止決不可許會要北邊鹽池唐安北都䕶府有湖樂池嵗得鹽萬四千斛以給振武天徳食貨志雍熙四年禁市北界骨堆渡口鹽國朝會要唐黔州有井四十一成州嶲州井各一果閬開通井百二十三山南西院領之邛眉嘉有井十三劍南西川院領之梓遂緜合昌渝盧資榮陵簡有井四百六十劍南東川院領之皆隨月督課開元元年劉彤上表言漢孝武皇帝殫費之甚十倍當今而古費多而貨有餘今用少而財不足何也豈非古取山澤而今取貧民哉取山澤則公利厚而人歸於農取貧民則公利薄而人去其業上遂令姜師度强循與諸道按察使檢責海内鹽鐵之課通典舊唐志天寶至徳間鹽每斗十錢乾元元年鹽鐵鑄錢使第五琦初變鹽法就山海井竈近利之地置監院游民業鹽者為亭戸免雜徭盜鬻者論以法及琦為諸州榷鹽鐵使盡榷天下鹽斗加時價百錢而出之為錢一百一十唐志自兵起流庸未復税賦不足供費鹽鐵使劉晏以為因民所急而税之則國足用於是上鹽法輕重之宜以鹽吏多則州縣擾出鹽鄉因舊監置吏亭戸糶商人縱其所之江嶺去鹽逺者有常平鹽每商人不至則減價以糶官民收厚利而人不知貴晏又以鹽生霖潦則鹵薄暵旱則土溜墳乃隨時為令遣吏曉導倍於勸農吳越揚楚鹽廩至數千積鹽二萬餘石有漣水湖州越州杭州四場嘉興海陵鹽城新亭臨平蘭亭永嘉大昌候官富都十監嵗得錢百餘萬緡以當百餘州之賦自淮北置巡院十三曰揚州陳許汴州廬夀白沙淮西甬橋沂西宋州泗州嶺南兖鄆鄭滑捕私鹽者奸盜為之衰息然諸道加榷鹽錢商人舟所過有税晏奏罷州縣率税禁堰埭邀以利者晏之始至也鹽利嵗纔四十萬緡至大厯末六百餘萬緡天下之賦鹽居半宫闈服御軍餉百官禄俸皆仰給焉食貨志河北鹽唐自兵興河北鹽法覊縻而已至皇甫鏄奏置榷鹽使如江淮榷法犯禁者嵗多及田𢎞正舉魏博歸朝廷穆宗命河北罷榷鹽唐志後唐長興四年鹽鐵使奏每年人户蠶鹽並不許将帶入域侵奪課利開寶三年四月詔河北諸州鹽法並許通行量收税錢每斤過税一文住賣二文隠而不税悉沒官以其半給捕人充賞會要詳説洪範初一曰五行一曰水水曰潤下潤下作鹹此鹽之根原五行之氣無所不在水周流於天地之間潤下之性無所不在其味作鹹凝而為鹽亦無所不在種類品目甚多世所共知者有三如出於海出於井出於池三者鹽之尤多世共知之如青州出於東井幽薊北海嶺南南海皆出於海劍南西川出於井如河東鹽出於池如解池鹽之尤著者三種之外所出亦多如河北有鹵地此出於地者如永康軍鹽出於崖此出於山者又有出於石出於木品類不一大抵鹽生民之日用不可一日缺者所以天地之間無處不有自禹貢青州貢鹽絺此海鹽之見於經三代之時鹽雖入貢與民共之未嘗有禁法自管仲相威公當時始興鹽筴以奪民利自此後鹽禁方開雖漢興除山澤之禁到武帝時孔僅桑𢎞羊祖管仲之法鹽始禁榷至昭帝之世召賢良文學論民疾苦請罷鹽鐵又桑𢎞羊反覆論難所以鹽榷不能廢元帝雖暫罷之卒以國用不足復建自此以後雖鹽法有寛有急然禁榷與古今相為終始以此知天下利源不可開一開不可復塞於是論其作俑出於管仲計近功淺効奪民利以開鹽禁自此天下之鹽皆入禁榷論禁榷之利惟是海鹽與解池之鹽最資國用南方之鹽皆出於海北方之鹽皆出於池如蜀中井鹽自贍一方之用於大農之國計不與焉前代鹽法興衰皆不出於所論今且論宋朝鹽本末宋朝就海論之惟是淮鹽最資國用方國初鈔鹽未行是時建安軍置鹽倉乃令真州發運在真州是時李沆為發運使運米轉入其倉空船回皆載鹽散於江浙湖廣諸路各得鹽資船運而民力寛此南方之鹽其利廣而鹽榷最資國用解池之鹽朝廷専置使以領之北方之鹽盡出解池當時南方之鹽全在海北方之鹽全在解池然而南方之鹽管得其人則其害少惟北方解池之鹽有契丹西夏之鹽嘗相參雜奪解池之鹽所以宋朝議論最詳大抵解池之鹽味不及西夏西夏優而解池劣價直西北之鹽又賤所以㳂邊多盜販二國鹽以奪解池所以國家常措置關防西夏常䕶視入中國界大抵南方所出是海鹽自漢以來海鹽井鹽用煎熬之制皆烹煉後成兩處之鹽必資人力如解池之鹽大抵如耕種疏為畦壠決水灌其間必南風起此鹽遂熟風一夜起水一夜結成鹽所以北方皆坐食鹽如南風不起則課利遂失夫海鹽井鹽全資於人解池之鹽全資於天而人不與至徽宗時如兩浙之鹽多有變更自蔡京秉政廢轉搬倉之法使商賈入納於官自此為鈔鹽法請鈔於京師商賈運於四方有長引短引限以時日各適所適之地逺近以為差蔡京専利罔民所以鹽法數十日一變鹽法既變則鈔鹽亦不可用商賈既納錢之後鈔皆不用所以商賈折閲甚多此海鹽之一變也解鹽之變縁徽廟初雨水不常圍壍不密守者䕶視不固為外水參雜雨水不常外水瀰滿流入解池不復成鹽所以數年大失課利後大興徭役盡車出外水漸可再復此是解鹽之一變也若論禁榷之利天下之鹽固皆禁榷惟是河北之鹽自安史亂河北一路縁藩鎮據有河北鹽後本朝因而以鹽定税所以河北一路鹽無禁榷仁宗時議者要禁榷仁宗不肯神宗時王安石章惇亦欲禁榷神宗亦不許自後章惇為相方始行禁榷犯刑禁者甚多盜賊滋起河北所以不可禁榷兼河北之鹽又與其他不同如井鹽官司只守一井故井鹽可榷如解池之鹽毫釐封守亦可禁榷海鹽亦待煎起爐閉爐非一旦所成官司又勤禁察亦可禁榷惟河北鹽是鹵地其地甚廣非如井池可以為牆垣籬壍封守又却才煎便成非如海鹽必待煎煮可以禁察所以最易得犯禁自章惇禁榷河北一到靖康之末盜賊愈多河北風俗慓悍鹽又易成小人圖利所以不體朝廷之法遂輕來相犯鹽大略如此然推大綱論之鹽固是三代以前與民共之若就後世不得已彼善於此論之取諸山澤不猶勝取之於民蓋所謂興販煎鹽皆非地著之人因而取之必寛民力本之民力然而取之欲寛不盡其利則鹽可以公行若迫而取之必有官刑此見小失大鹽法所以不行厯代制度詳説卷五
