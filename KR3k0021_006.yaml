body:
  text: 厯代制度詳說卷六宋吕祖謙撰酒禁制度禹惡㫖酒而好善言孟子離婁古有醴酪禹時儀狄作酒禹飲而甘之遂疏儀狄絶㫖酒曰後世必有以酒亡國者通鑑外紀周成王以商餘民封康叔作酒誥厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺又惟商之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺王曰封汝典聽朕毖勿辨乃司民湎于酒書酒誥周禮萍氏掌幾酒謹酒鄭氏釋之謂幾者苛察沽買過多及非時者謹者使民節用而無彛也漢文帝後元年詔曰以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃師古曰末謂工商之業也蕃亦多也扶元反為酒醪以靡穀者多師古曰醪汁滓酒也靡散也醪來髙反靡音縻六畜之食焉者衆與細大之義吾未能得其中師古曰中竹仲反其與丞相列侯吏二千石博士議之本紀景帝中元三年夏旱禁酤酒本紀武帝時桑𢎞羊為御史大夫興榷酤之利始元中徵文學賢良問以治亂皆對請罷郡國鹽鐵酒榷均輸務本抑末無與天下爭利然後教化可興御史大夫桑𢎞羊謂此乃國家大業不可廢也孝武天漢三年初榷酒酤孝元時賈捐之上書曰昔孝文時天下人賦四十丁男三年而一事今天下人賦數百造鹽鐵榷酒之利以佐用度猶不足而人困矣王莽時魯匡言名山大澤鹽鐵錢布帛五均賒貸斡在縣官惟酒酤獨未斡請法古令官作酒而人愈病陳文帝天嘉中虞荔等以國用不足奏請榷沽從之隋文帝開皇三年罷酒坊與百姓共之唐廣德中敕天下州各量定沽酒户隨月納稅除此外不問官私一切禁斷大厯中量定三等逐月稅錢並充布絹進奉建中間制禁人沽酒官制店沽取助軍費唐書國家承李唐舊制酒皆有榷太祖乾德四年以京城民酤釀者規利頗多命有司計其麴蘖之用定其價直仍官給與升量之器太宗淳化五年詔徵天下酒榷先遣使者監管嵗取其利以資國用自今募民掌之減常價十之二使其易辦勿復遣吏與其間是嵗又罷之但賣麴收其值先是官吏為擾州縣苦之故有是詔真宗咸平六年遣朝官乘傳諸州郡增榷沽之課景德元年罷之又景德元年下詔榷酤之法素有定規宜令計司立為定式自今中外不得妄議增課以圖恩奬仁宗天聖元年太常博士王軫上言諸處酒務先係買撲每嵗課利多有不登望復許百姓買撲三司詳定如所奏詳說酒之為禁自古至今大略有三變若論始者周公命康叔撫封侯衛作酒誥一篇其刑之重至於盡執拘以歸於周豫其殺此是最初禁酒恐人沉湎浸漬傷德敗性不過導迪彛常防間私欲之意至於周官之禁酒禹之惡㫖酒皆是此意及其再變如漢文帝為酒酺景帝以嵗旱禁民沽酒此是第二節這一節比上面古人恐民傷德敗性已自不同恐有用為無用之物耗米穀民食不足此是其再變比之酒誥所謂非惟不敢亦不暇已無此意然而猶有敦本抑末之心及至三變自桑𢎞羊建榷酒之利與往昔大相反不過榷其利佐武帝用兵興宫室之侈靡意不於防民之得失多設利網為罔利之具延及隋唐皆如此到得第三節與前面甚相反前面二者雖有優劣然大率惟恐人飲酒到後來惟恐人不飲酒設心大不同不過私家不得擅利公家却自専其利到得榷酒又變多設侈靡眩誘百姓納之於有過之地如桑𢎞羊當時不過榷酒利以歸縣官到後世比之𢎞羊又别自王荆公開利門置斂散青苗法一時新進苛刻之徒布在州縣青苗固收利息於散青苗之時官司又多張酒肆廣為聲樂眩耀人之耳目今俗謂之設法蓋自此始直欲納民於有過之地又是桑𢎞羊榷酒之上大抵論榷沽之變不過五節自桑𢎞羊既開利孔之後雖有賢君良臣多是因循不能變然而當賢君良臣不得已之中於此亦未嘗無一個省節示此意於天下且以宋朝論之今則人不參前代本末只讀太祖故事徒見當時如犯酒至一石即死便以為太祖行刑之酷初不曾去考前代不知祖宗寬仁之意何則太祖所承五代五代之時如王章之徒捉酒涓滴處死自涓滴至於一石其法甚寬自不知本末者看之惟知祖宗之法重自上面看來方知仁厚之至與五代大不相似自後列聖相承漸漸蠲減所以後來酒禁都無死刑正如孔子所謂為之兆也不特酒一事如此人若不曾看五代事便看本朝多道太祖尚嚴不知祖宗不嗜殺人緣前立法之重到此已是蠲減然而不可驟減減之必以其漸此又論治體之所當知也厯代制度詳說卷六
