  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0021_WYG_001-1a, image: WYG0923/WYG0923-0896c.png}
body:
  text: 厯代制度詳說卷一宋吕祖謙撰科目制度賔興大司徒以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數鄉大夫三年則大比考其德行道藝而興其賢者能者鄉老及鄉大夫帥其吏以禮禮賔之獻賢能之書於王王再拜受之登於天府內史二之地官論士命鄉論秀士升之司徒曰選士注移名於司徒也司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士注移名於司馬進士可進受爵祿也司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之王制孝弟力田漢惠帝四年舉民孝弟力田者復其身文帝十二年詔孝弟力田三老廉吏今萬家之縣云無應令其議戶口率置三老孝弟力田常員并漢書後漢顯宗中元二年賜三老孝弟力田爵人三級唐廣德二年停孝弟力田科唐會要開寶三年詔諸州有孝弟德行者籍滿萬五千户聽舉一人㑹要開寶八年詔郡國察民有孝弟力田或文武堪用者會要制舉漢文帝二年詔舉賢良方正能直言極諫者武帝建元元年丞相衛綰奏賢良或治申商韓非蘇秦張儀之言請皆罷奏可元光元年五月詔賢良曰賢良明於古今王事之體受䇿察問咸以書對於是董仲舒公孫𢎞等出焉并漢書光武建武六年以日食舉賢良方正諸漢帝凡日食地震山崩川竭皆詔舉賢良通典唐制取士天子自詔者曰制舉所以待非常之材焉唐選舉志臨難不顧徇節寧邦科長夀三年薛稷長材廣度沉迹下僚科證聖元年張􅀈才膺管樂科神龍二年張大來藏名負俗科景雲二年李俊之文經邦國科先天元年韓休道侔伊吕科先天元年張九齡將帥科開元十二年裴敦復王霸科開元二十二年劉瓘樂道安貧科大厯二年楊鷹軍謀越衆科建中元年夏侯審丁俯國初制科有賢良方正直言極諫經學優深可為師法詳間吏理達於教化凡三科應內外草澤人并許諸州及本司解送上吏部對御試䇿一道二三千字以上取文理俱優者為入等景德四年帝曰比設此科欲求材識若但考文義茍有濟時之用安得知今䇿問宜用經義參之時務天聖七年詔復置賢良方正能直言極諫博通典墳明於教化才識兼茂明於體用詳明吏理可使從政識洞韜略運籌決勝軍謀宏逺材任邊寄六科內外官許應又置髙蹈丘園沉淪草澤茂材異等三科草澤人許應并進所業䇿論五十首如優長召試論六首以三千字為合格即御試熙寧二年賢良孔文仲考入第三等詔毁薄時政不足收録告示發赴本任熙寧七年中書門下言今進士已罷詞賦所試事業與制舉無異賢良等科乞罷從之乾德二年賢良穎贄天聖八年茂材富弼景祐二年體用吳育嘉祐六年賢良蘇轍蘇軾孝廉元光元年董仲舒請擇吏民賢者嵗貢二人帝於是令郡國舉孝廉各一人元朔元年詔孝廉或闔郡不薦一人不舉孝者以不敬論不察廉免并漢書光武十二年詔三公舉茂材廉吏各一人所舉率不復試謗議漸生通典漢獻帝建安五年詔舉至孝漢順帝陽嘉元年左雄議察舉限年四十以上諸生試家法文吏課箋奏有不承科令者正其罪法如有顔回子竒不拘年齒有廣陵孝廉徐淑年未及舉雄詰顔回聞一知十孝廉聞一知幾淑無以對乃譴還郡於是太守胡廣等十餘人皆坐謬舉免黜唯陳蕃等三十餘人得拜郎中自是牧守畏栗莫敢輕舉迄于永熹察選清平多得其人左雄傳孫權郡察孝廉州舉茂材三國志魏黃初三年除漢限年之制通典東晉元帝以喪亂孝秀不復䇿試既經略粗定乃詔試經孝秀莫敢應命唐髙祖詔諸州秀才縣考試州長重覆試嵗隨方物入貢通典貞觀十八年引孝廉問皇王政術并不能答初秀才科等最髙試方略五條貞觀中有不第者坐其州長於是廢開元後復有此舉時無及第者自是士俗所趨向惟明經進士二科而已通典寶應二年揚綰請依鄉舉里選察秀才孝廉明經進士并停旋復故通典建中元年停孝廉科會要計偕元光五年詔召吏民明當世之務習先聖之術者縣次續食令與計偕漢武紀注計者上計簿使也郡國每嵗詣京師上之令所召之人與上計者俱來武學成帝元延元年四月詔北邊舉勇猛知兵法者各一人後漢安帝建安元年詔舉武猛堪將帥者各五人晉武帝咸熙五年詔舉勇猛秀異唐長安二年教人習武藝每嵗如明經進士法送兵部科試長垜馬射步射平射筒射又有馬搶翹關負重身材之選翹關長丈七尺徑三寸半凡十舉後手持關距出處無過一尺負重負米五斛行二十步皆為中第通典并唐志天聖七年詔置武舉天聖八年帝御崇政殿親試武舉人皇祐元年罷武科舉治平元年復置武舉諸科後漢順帝陽嘉元年以太學新成試明經下第者補弟子增甲乙科後漢書注云音義曰甲科謂作簡䇿難問列置案上在試者意投射取而答之謂之射䇿上者為甲次者為乙若録政化得失顯而問之謂之對策唐明經之制有五經有三經有二經有學究一經有三禮有三傳選舉志明經所試一大經及孝經論語爾雅帖既通口問一經十義得一者為通問通而後試策三條皆通者為第熙寧四年明經科廢罷中正魏文帝立九品官人之法州郡皆置中正注云九品之制因後漢建安中衣冠多離本土置中正為之區别及法弊也唯能知其閥閲非復辨其賢愚九品及中正開皇中方罷進士隋煬帝始建進士科唐寶應二年楊綰上疏言進士科起於隋大業中唐因隋舊明經進士二科初止試䇿貞觀八年詔加進士試讀經史一部至調露二年劉思立奏二科并加帖經通典及試雜文會要進士所試一大經及爾雅帖既通後試文試賦各一篇文通而後試策凡五條皆通者為第通典貞觀二十三年王師旦知舉而張昌齡王公謹聲震京邑奏等第無二人名太宗召師旦問之對曰此輩體性輕薄文章浮豔擢之恐有變風雅帝以為名言唐李揆乾元中進禮部侍郎揆病取士不考實徒露搜索禁所挾而迂學陋生葄枕圖史且不能自措於詞乃大陳書廷中進諸儒約曰上選士第務得才可盡所欲言由是人人稱美本傳先是進士試詩賦建中二年趙贊以針論表贊代詩賦大和八年復試詩賦鄭覃疾進士浮薄屢請罷之文宗曰敦厚浮薄色色有之進士科取人二百年矣不可遽罷會要武宗即位李德裕論進士不根藝實朝廷顯官須公卿子弟為之㑹要太平興國三年詔律賦以平側次用韻天聖五年詔進士參考䇿論慶厯四年宋祁等言使士皆土著而教之於學校先䇿論則文辭者留心於治亂簡其程式則宏博者得以騁問以大義則執經者不専於記誦賦許依倣唐人賦體詔頒下五年詔進士諸科如舊制考校注云先是頒行宋祁等新制上封者言非便熙寧四年詔進士罷詩賦帖經墨義令各占一經并論語孟子諸科稍令改進士科嘉祐二年詔自今間嵗一開科場四年設科時頗淹久治平三年詔今後三嵗一開科場唐取士制唐制取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明算有一史有三史有開元禮有道舉有童子有史科此嵗舉之常選也其天子之自詔者曰制舉所以待非常之材焉選舉志殿試武后天授元年䇿問貢士於洛城殿貢士殿試自此始通鑑開寶六年三月帝御講武殿復試進士慶厯二年正月七日富弼言省試有三長殿試有三短請令南宫考定髙下於殿廷唱名著為彛式九月詔且依舊例熙寧三年三月上御集英殿試進士內出制䇿知舉𤣥宗開元二十四年舊制考功員外郎掌試貢舉人有進士李權陵侮員外郎李昂議者以員外郎位卑不能服衆敇自今委禮部侍郎試貢舉人通鑑帖經帖經者以所習經掩其兩端中間開為一行裁紙為帖凡帖三字隨時增損得四得五得六者為通天寶十一載揚浚始開為三行試日設兵衛薦棘圍之進士大抵千人得第者百一二明經倍之得第者十一二試已糊其名考之别試初禮部侍郎親故移試考功謂之别頭正元十六年中書舍人髙郢奏罷議者是之元和十三年庾承宣奏復考功别頭試太和三年姚中立奏停考功别頭試六年賈餗又奏復之唐選舉志家保狀會昌四年中書門下奏舉人於禮部納家狀後望依前五人自相保公薦建隆四年詔不得更發公薦故事每嵗知舉將赴貢闈臺閣得公薦所知纍舉賜出身開寶三年詔貢士十五舉者具名以聞籍到司馬浦等百六人賜本科出身鎖㕔天禧二年詔鎖㕔應舉人到省不及格勒停元年詔鎖㕔不合格除落罪名詳說取士科目自夏商以前不見於經其可見者至周始有自周後數千載凡其間廢置因革輕重就所偏者看皆自可考然而考論須見得廢置因革輕重之所以然以大略觀之大抵向前重向後愈輕且如周禮以鄉三物教民謂之賔興只看賔之一字當時蓋甚尊士詳考前一段他一個本末度數精詳具備固不必說只看他賔興之三年大比獻賢能之書於王王拜受之登於天府內史二之如此其重及至後世如飲墨水如奪席脫客刀如棘闈如糊名若防奸盜然為士者須深思其故何故古如此重後世如此輕須當深究之三代之時士一個進修之至惟上之人自求之故如此重又須看當時之於士待之甚重而考之則甚詳後世待之既輕考之又略且如王制論鄉秀士升於司徒曰選士司徒又論其士之秀者而升之學曰俊士然後方免其徭役大樂正又論造士之秀者升諸司馬曰進士這裏方可以受爵祿司馬政官也以其可使從政也凡經四級然後始從政然猶未也司馬又辨論官材論其賢者以告於王而定其論論定然後官之任官然後爵之待其位定始與之以祿一人之身未入仕之前凡經四級已入仕之後凡經三級經七級然後始得祿其考之詳如此成周之時見得官爵皆天位天祿不敢輕授至後世與之甚遽全以文字髙下為進退蓋有以一日之長而決取終身之富貴者然論其大略漢唐以來大抵自重而漸輕自緩而漸速由漢以來雖不能如三代拜受之禮然猶長州身勸為之駕雖以當時號為諂諛如公孫𢎞者猶是鄉人勸勉而來未嘗自進到得後來唐始令投牒自進按原本作楊綰投牒自進通考作唐始令投牒自進考唐書寶應二年禮部侍郎楊綰請進士勿自投牒非綰投牒自進也今依通考改正而士始甚輕此所謂自重而漸輕自漢至唐進士登第者尚未釋褐或是為人所論薦或再應皆中或藩方辟舉然後始得釋褐至本朝始放進士及第即放釋褐此所謂自緩而漸速科目雖多其間厯代常行自有數自漢至隋以前惟孝廉與秀才常行自隋唐至本朝惟進士明經常行至熙寧後王荆公用事改取士之法自是進士獨存明經始廢此其大略可見其次便是制科却厯代常行不廢漢則因事而舉六朝亦間舉至唐及本朝亦未嘗廢到得熙寧間王荆公得政孔文仲對策議新法制科始罷至元祐初又再復得兩三舉至紹聖初章惇為相欲行荆公法又再罷大抵三代之時不專是語言文章至漢以來則有所謂射䇿對䇿是時已成科舉之習雖然尚理會經義入與時議到隋煬帝之時風俗浮華始有進士之科方有律賦自唐以來孝廉秀才之科尚在但只是明經進士二科盛而孝秀衰是時才記傳記則謂之明經文章之士則謂之進士故有記問者則得明經有辭藻者則得進士當時南北未分兩邊各自設科既分之後後周進士未設尚自理會秀孝二科是時南人髙南師北人髙北師各守家法莫之能定當時主司有欲優劣之者反為所難隋煬帝時風俗浮華進士科始立至唐初間進士明經都重及至中葉以後則進士重而明經輕蓋當唐之時文華之士多了故如此到得本朝待遇不同進士之科往往皆為將相皆極通顯至明經之科不過為學究之類當時之人為之語曰焚香收進士嗔目待明經才設進士試時便設香案有拜跪之禮才到明經試時則設棘監守惟恐他傳義當時進士却有帖經之制他文士都不屑去記這傳義於是有贖帖才是進士科試帖經不知是或作一篇文或作一賦便可贖帖經及至熙寧間荆公罷詞賦帖經墨義併歸進士一科齊魯河朔之士往往守先儒訓詁質厚不能為文辭所以自進士科一併之後榜出多是南人預選北人預者極少自哲廟以後立齊魯河朔五路之制凡是北人試者皆别考然後取人南北始均慶厯中范文正公富鄭公韓魏公執政欲先試論策使工文辭者言古今治亂簡其程式使得以逞問以大義使不専記誦自是古文漸復一年而三公皆罷政此制遂停王文正為相南省試進士當仁不讓於師賦時邊讓李迪皆有名場屋榜出二人不與試官取其文觀之李以落韻邊以師為衆與注疏異特奏令御試王公議以為落韻者不審爾若舍注疏而立說不可許遂取李黜邊前輩之守注疏如此嚴至王荆公始以注疏皆不可用作三經說令天下士非從三經者不預選舉之列罷詞賦又以春秋有三傳難通罷之至元祐間始復詞賦增春秋又至紹聖章惇執政欲復介甫法遂復罷詞賦去春秋後來至欽宗又始復元祐制大抵須是有鄉舉里選底風俗然後方行得鄉舉里選之制所以楊綰復鄉舉里選未幾停罷緣是未有這風俗今已為士須思所以為風俗者何由又須深察三代之所以厚而後世之所以薄者何故則亦庶乎復古厯代制度詳說卷一
