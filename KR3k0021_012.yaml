body:
  text: 厯代制度詳説卷十二宋吕祖謙撰馬政制度官名周校人掌王馬之政辨六馬之屬趣馬掌贊正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聴馭夫巫馬掌養疾馬而乗治之牧師掌牧地皆有厲禁而頒之庾人掌十有二閑之政教圉師掌教圉人養馬圉人掌養馬芻牧之事唐其官領以大僕其屬有牧監副監監有丞有主簿直司團官牧尉排馬牧長羣頭有正有副凡羣置長一人十五長置尉一人嵗課功進排馬又有掌閑調馬習上又以尚乗掌天子之御儀鳳中以大僕少卿李思文檢校隴右諸牧監使監牧有使自是始後又有閑廏使使皆置副有判官又置四使南使十五西使十六北使七東使九廏名周庾人掌十有二閑見上唐天子之御左右六閑一曰飛黄二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑總十有二閑為二廏曰祥驎曰鳳苑其後又增置飛龍廏自貞觀至麟徳四十年間置八坊岐豳涇寧閑地廣千里八坊曰保樂曰甘露曰南普潤曰北普潤曰岐陽曰太平曰宜禄曰安定凡馬五千為上監三千為中監餘為下監監皆有左右因地為之名其後益置八監於鹽州三監於嵐州牧地秦之先曰非子居犬邱周孝王使主馬於汧渭之間魯僖公牧於駟野衛文公之騋牝三千漢之樓煩唐之沙苑善養人秦之先曰非子居犬丘好馬及善養息之周孝王使主馬於汧渭之間馬大蕃息唐初用太僕少卿張萬嵗領羣牧自貞觀至麟徳四十年間七十萬六千匹其時天下以一縑易一馬萬嵗掌馬久恩信行於隴右唐王毛仲檢校内外閑廏知監牧使官吏憚之無敢犯雖官田草萊樵斂不敢欺於牧事尤力娩息不訾初監馬二十四萬後乃至四十三萬牛羊皆倍數從𤣥宗東封取牧馬數萬匹每色一隊相間如錦綉天子才之不稱職漢征和二年制詔公孫賀重按重字疑有誤馬傷耗武備衰減唐自萬嵗失職馬政頗廢永隆中夏州牧馬之死失者十八萬四千九百九十穆宗時岐人叩闕訟閑廏使張茂宗所奪田事下御史按治悉予民督責唐景雲二年詔羣牧嵗出髙品御史按察之市馬唐開元初國馬益耗太常少卿姜晦乃請以空名告身市馬於邊州率三十匹讐一遊擊将軍其後突厥欵塞𤣥宗厚撫之嵗許朔方軍西受降城為互市以金帛市馬於河東朔方隴右牧之既雜以異種馬乃益壯天寶後諸軍戰馬動以萬計議者謂秦漢以來唐馬最盛天子又鋭志武事遂弱西北蕃徳宗建中元年市關輔馬三萬以實内廏憲宗元和十一年伐蔡命中使以絹二萬市馬河曲假馬種與民漢武帝令民得畜邊縣官假馬母三嵗而歸及息什一後車騎馬乏縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出牡馬天下亭亭有畜字馬嵗課息言馬利便漢馬援好騎善别名馬於交趾得駱越銅鼓乃鑄為馬式還上之因表曰行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之難有詔置於宣政殿下以為名馬式唐太和七年度支鹽鐵使言銀州水甘草豐請詔刺史劉源市馬三千河西置銀州監以源為使馬少漢武帝自衛青圍單于後十四年不復擊匈奴者以漢馬少土産左傳韓之戰晉侯乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乗異産以從戎事及懼而變将與人易亂氣狡憤隂血周作張脉僨興外强中乾進退不可周旋不能君必悔之不聴晉戎馬還濘而止公號慶鄭曰愎諫違卜固敗是求又何逃焉遂去之詳説自黄帝堯舜觀象立制服牛乗馬引重致逺自此馬始為用考之三代之制自天子萬乗諸侯千乗大夫百乗立國制賦之法莫不以馬為根本所以成周之法在古今最為精密然而大而天子次而諸侯下而士大夫固是乗馬之數多寡不同細考當時之數所謂牧養之法有養之於官有藏之於民所謂藏之於民如邱甸嵗取馬一匹之類皆是藏之於民不待國家芻秣如有事田獵征伐臨時徵用然而在天子之都諸侯之國大夫之家亦未嘗不自畜馬此是養之於官者舉此一件事論之便可見且如周禮説天子十有二閑先儒論馬謂不過三千餘匹衛文公承懿公之後新造之國末年亦至騋牝三千若以制度論之衛以諸侯之國又當殘亂之後其他故未及論如何便及成周全盛馬之數所謂天子十有二閑是養之於官者衛文公所謂騋牝三千舉官民通數言之又以當時春秋戰國言之且如鄭西宫之亂子國為盜所殺子産以車十七乗出討賊子産當時謂之百乗之家若是徴求馬於郊野之間盜賊猝至如何便得集所謂十七乗之馬乃是育之於家者以此數事論之三代馬政時固有在官者亦有在民者數之多者在民平時無芻秣之費數之少者在官征伐無不至之憂當時法度最為詳備到漢所謂三十六苑之馬亦是官司所養之馬若是其他郡國民間養馬雖多亦是養之於民如衛青霍去病之徒伐匈奴有所謂官馬有所謂私馬則其制可見到後周隋唐之間府兵之制天子閑廏監牧馬非不盛然府兵初未嘗給馬不過給之以錢使府兵自買馬若是不足衆人共出錢買馬以此知尚有古之遺法在到後來府兵之法漸壊府兵貧不足以買馬然後方以監牧之馬給之這是制度壊如此且以唐言之當時所謂在官在私之馬多少匹數與三代不相類故唐自張萬嵗領監牧馬至於四十餘萬匹之多當時芻秣之費地牧之廣豈無所妨在官在私却與三代之馬不相似若是論之馬數最多無如後魏後魏馬數至二百餘萬匹前魏未有如此之盛後魏亦未有如此之多自此以後隋唐間雖習熟見聞以馬多為盛他亦未嘗攷習俗風土之所宜蓋拓跋當時在二者之間起自北方北方芻秣便是内地耕桑内地人人耕桑北方人人芻秣當時有二百餘萬匹馬亦不足怪自是常理自孝文遷都變易舊俗馬政便不得似當時多江淮之馬不過十萬匹如唐養馬多亦是不知當時後魏之意宋朝馬政自太宗講求精微當時委郡牧司自春放至秋歸馬之出入莫不有法到後來熙豐間曾孝寛領縣牧奉行王荆公意於是罷郡牧吏不過欲區區小利自出賣自此京師之馬更不出牧終嵗在槽櫪之間自此馬始衰戎備益損芻秣之費益增矣蓋當時不曾攷本末却欲舉保馬户馬之法只為讀周禮不詳亦要知周禮之井牧然而事有先後未有如漢唐之制却要用周井牧之馬當時大為民害百姓自此彫弊蓋井地不均兼并者衆什一之制未行受田之制未定獨舉養馬之制豈不重困以此知學者當考究本末誦其詩讀其書然後可以為政厯代制度詳説卷十二
