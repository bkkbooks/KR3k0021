body:
  text: 厯代制度詳說卷七宋吕祖謙撰錢幣制度坑冶青州貢岱畎絲枲鉛松怪石疏云鉛錫也岱山之谷有此五物揚州貢金三品注云金銀銅也疏鄭𤣥以為金三品者銅三色也荆州貢金三品與揚州同梁州貢璆鐵銀鏤砮磬並禹貢注鏤剛鐵也疏云鏤者可以刻鏤故為剛鐵也丱人掌金玉錫石之地而為之厲禁以守之若以時取之則物其地圖而授之巡其禁令地官丱之言礦也金玉未成器曰礦丱革猛虢猛二反黃帝問於伯髙曰吾欲陶天下而為一家為之有道乎伯髙對曰上有丹砂者下有金上有磁石者下有銅金上有陵石者下有鉛錫赤銅上有赭者下有鐵此山之見榮者也管子凡銅銀錫鐵之冶百六十八陜宣潤饒衢信五州銀冶五十八銅冶九十六鐵山五錫山二鉛山四汾州礬山七元和三年詔天下有銀之山必有銅礦銅者可資於鼓鑄銀者無益於民人權其輕重使務専一自五嶺以北銀坑並宜禁斷會要湯七年旱禹五年水民之無􅕷有賣子者湯以莊山之金鑄幣而贖民之無􅕷賣子者管子管子謂齊威公曰君其率白徒之卒鑄莊山之金以為幣武宗廢浮屠法永平監李都彥請以銅像鐘磬爐鐸皆歸巡院州縣銅益多矣鹽鐵使以工有常力不足以加鑄許諸道觀察使皆得置錢坊淮南節度使李伸請以天下州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢宣宗即位盡黜會昌之政新錢以字可辨復鑄為像唐志太平興國八年張齊賢為江南轉運使遣丁釗饒信處州銅鉛錫因新用鉛錫於饒州永平監嵗鑄錢三十萬貫淳化二年宗正少卿趙安易請於劍州鑄大錢十當百宋琪李惟清議非便安易鑄大錢百餘以進墜於殿階破碎帝復遣安易往川陜鼓鑄衆議非便乃罷名色虞夏商周金幣三等或赤或白或黃為上幣銅鐵為下幣國語注賈侍中說又管子云虞得策乘馬之數百畝之夫與之策資之幣又云先王珠玉為上幣黃金為中幣刀帛為下幣通典云夏商以前幣為三品珠玉為上幣黃金為中幣白金為下幣前漢食貨志云凡貨金錢布帛之用夏商以前其詳靡記洪範八政二曰貨外府掌邦布之入出以共百物而待邦之用凡有法者天官注布泉也布讀為宣布之布其藏曰泉其行曰布取名於水泉其流通無不遍太公為周立九府圜法漢志李竒曰國即錢也圜一寸而重九兩師古曰此說非也周官大府玉府內府外府泉府天府職內職金職幣皆掌才幣之官故云九府圜法謂均而通也黃金方寸而重一斤錢圜函方孟康曰外圜而內孔方也輕重以銖師古曰言黃金以斤為名錢則以銖為重也布帛廣二尺二寸為幅長四丈為匹故貨寶於金利於刀如淳曰名錢為刀者以其利於民也流於泉如淳曰流行如泉也布於布如淳曰布於民間束於帛李竒曰束聚也太公退又行之於齊秦兼天下幣為二等黃金以鎰為名上幣漢志孟康曰二十兩為鎰也師古曰改周一斤之制更以鎰為金之名數也髙祖初賜張良金百鎰此尚秦制也上幣者二等之中黃金為上而錢為下也銅錢質如周錢文曰半兩重如其文為下幣漢興以秦錢重難用更令民鑄策錢如淳曰如榆策也黃金一斤師古曰復周之制更以斤名金髙后二年行八銖錢六年行五分錢並漢志輕重周景王二十一年患輕錢將更鑄大錢單穆公曰不可古者天降災戾於是乎量資幣權輕重以賑救民民患輕則為之作重幣以行之於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王費輕作重民失其資能無匱乎弗聽卒鑄大錢文曰寶貨肉好皆有周郭以勸農贍不足百姓蒙利焉國語漢志漢武帝時錢益多而輕物益少而貴乃為皮幣白金三品漢志章帝時穀價貴張林言此錢賤故爾宜封錢勿出詳見廢錢門南齊髙帝建元四年奉朝請孔顗上言三吳比嵗被水潦而糴不貴天下錢少非穀賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為無纍輕錢弊盜鑄而盜鑄為禍深民所以盜鑄嚴法不能禁者由上鑄錢惜銅愛工也通鑑通典唐穆宗時楊於陵議曰古者權之於上今索之於下昔散之四方今藏之公府昔廣鑄以資用今減鑄以廢功昔行之於中原今泄之於邊裔又有閭井送終之給商賈貸終之積江湖覆壓之耗則錢焉得不重貨焉得不輕宜使天下兩稅榷酒鹽利上供及留州送使悉輸以布帛穀粟則人寬於所求然後用內府之積收市㕓之滯廣山鑄之數限邊裔之出禁私家之積則貨日重而錢日輕矣唐志禁鑄放鑄孝文五年更鑄四銖錢其文曰半兩除盜鑄錢令使民放鑄賈誼說帝曰法使天下公得雇租鑄銅錫為錢敢雜以鉛鐵為他巧者其罪黥師古曰雇租謂雇庸之直或租其本然鑄錢之情非淆雜為巧則不可得贏淆之甚微為利甚厚夫事有召禍而法有起奸今令細民人操造幣之勢各隱屏而鑄作因欲禁其厚利微奸雖黥罪日報其勢不止曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何賴焉又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立師古曰依法錢市肆異用錢文大亂今農事弃捐而采銅者日蕃故銅布於天下其為禍博矣今博禍可除而七福可致漢志後漢章帝章和二年詔罷郡國鹽鐵之禁從民煮鑄通鑑唐髙祖武德四年秦王世民齊王元吉賜三爐裴寂賜一爐聽鑄錢其餘敢盜鑄者身死家口配沒通鑑唐書𤣥宗開元二十二年宰相張九齡建議宜縱民鑄錢參軍劉秩言五不可於是下詔禁惡錢而已唐志後晉髙祖天福三年十一月敕聽公私自鑄銅錢無得雜以鉛錫每一錢重二銖四參十錢重一兩以天福元寶為文仍令鹽鐵使頒下模範惟禁私作銅器通鑑會要天福七年閩又鑄永隆通寶大鐵錢一當鉛錢百夾錫賈誼說孝文曰法使天下公得雇租鑄銅錫為錢敢雜以鉛鐵為他巧者其罪黥漢志王莽鑄作錢布皆用銅淆以連錫通典連銅屬也以連及錫雜銅而為錢也太平興國七年廬州言部內錢多是江南私鑄夾錫新錢詔禁之私鑄人棄市會要錢陌賈誼諫文帝曰民用錢郡國不同或用輕錢百加若干或用重錢平稱不受漢志應劭曰時錢重四銖法錢百枚當重一斤十六銖輕則以錢足之用重錢則平稱有餘不能受也師古曰若干且設數言之也臣瓚曰秦錢半兩漢初鑄莢錢文帝更鑄四銖錢秦錢與莢錢皆當廢而故與四銖並行民一見其廢故用輕錢則百加若干用重錢雖以一當一猶復不受之是以郡縣不同也梁大同以後自陂嶺以東八十為陌名曰東錢江郢以上七十為陌名曰西錢京師以九十為陌名曰長錢大同元年天子乃詔通用足陌詔下而人不從錢陌益少至於末年遂以往時緡錢出入皆以八十為陌後漢三司使王章減其出者三五代史禁銅賈誼論禁銅七福漢志唐開元十八年敕以人間多盜鑄始禁私賣銅鉛錫及以銅為器皿其采銅鉛錫者官為市取通鑑太平興國三年詔除佛像鐘磬銅鑑外民間銅器限一月悉送官給價償之會要憲宗元和三年置商賈蓄錢者令收貨物周嵗之後設蓄錢之禁會要後周世宗顯德二年敕始立監采銅鑄錢非縣官法物軍器及寺觀鐘磬鈸鐸之類悉令輸官給其值過期不輸五斤以上其罪死不及者論刑有差鐵錢公孫述廢銅錢置鐵官鑄鐵錢百姓貨幣不行本傳髙士傳曰史弼曰鐵錢二當一太平興國二年江南轉運使樊若水言江南舊用鐵錢於民非便望於饒州升州出銅處置官鑄錢其鐵錢即令諸州鼓鑄為農器詔從其請民甚便之會要景德二年知益州張詠言嘉邛二州所鑄景德元載大鐵錢今依福州鐵錢每貫用鐵三十斤取二十五斤八兩成直銅錢一小鐵錢十相兼行用從之會要邊官晉孝武太元三年詔曰廣州夷人寶貴銅鼓而州境素不出銅聞賈人皆以錢貨與夷人鑄韛作鼓其重為禁制得者科罪晉志開寶六年將見錢入蕃界及化外者五千以上處死仍具奏裁會要惡錢後魏世宗永平三年冬又鑄五銖錢禁天下用錢不依準式者魏志唐𤣥宗開元六年敕禁惡錢重二銖四參以上乃得行斂人間惡錢鎔之更鑄如式錢於是京師紛然買賣殆絶宋璟蘇頲請出大府錢二萬緡置南北市以平其價買百姓不售之物可充官用者及聽兩京百姓預假俸錢庶使良錢流布人間從之七年敕大府及府縣出粟十萬石糶之以斂民間惡錢送少府銷毁八年宋璟蘇頲建議嚴禁惡錢江淮間惡錢尤多璟以監察御史蕭隱之充使括惡錢隱之嚴急煩擾嗟怨盈路上於是貶璟之官罷璟為開府儀同三司頲為吏部尚書於是弛錢禁惡復行矣通鑑唐書太平興國二年詔聞江南民多用新小錢自今所用銅錢每貫七百七十陌須及四斤半以上方得行用會要券會憲宗時商賈至京師委錢諸道進奏院及諸軍使富家以輕裝趨四方合劵乃取之號飛錢京兆尹裴武請禁與商賈飛錢者搜索諸坊十人為保唐志天聖六年置益州交子務先蜀人以鐵錢私為交券謂之交子富人十户主之其後知州冦瑊請禁之而官為置務屢行下本路議利害至是始行之會要又云交子貿易真宗朝置務以朝臣主之廢復更易漢武帝建元元年行三銖錢五年罷三銖錢行半兩錢本紀武帝時天子與三公議更造錢幣以贍用而摧浮淫并兼之徒是時禁苑中有白鹿而少府多銀錫自孝文更造四銖錢至是嵗四十餘年從建元以來用少縣官往往多即銅山而鑄錢民亦多盜鑄錢輕物貴有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下今半兩錢法重四銖而姦或盜磨錢質而取鋊錢益輕薄而物貴則逺方用幣煩費不省乃以白鹿皮方尺緣以藻繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫得白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其文龍直三千其文馬直五百其文龜直三百令縣官鑄五銖錢周郭其下令不得磨取鋊漢武帝時郡國鑄錢民多奸鑄公卿請令京師鑄官赤仄一當五非赤仄不得行後二嵗赤仄錢又廢於是悉禁郡國毋鑄錢専令上林三官鑄錢錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸入其銅三官而民鑄錢益少計其費不能相當惟真工大奸乃盜為之漢貢禹言鑄錢采銅一嵗十萬人不耕民坐盜鑄陷刑者多富人藏錢滿室猶無厭足民心動搖弃本逐末耕者不能半奸邪不可禁原起於錢疾其末者絶其本宜罷采珠玉金銀鑄錢之官毋復以為幣租稅祿賜皆以布帛及穀使百姓一意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寖漢志魏文帝黃初二年罷錢以穀帛為市通典明帝大和元年復用錢後魏初民間不用錢孝文太和十九年始鑄錢至世宗河北民尤用物交易錢不入市通鑑自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云漢志王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行莽篡位以為書劉字有金刀乃罷契刀錯刀及五銖錢而更作金銀龜貝錢布之品凡寶貨五物六名二十八品百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢非井田挾五銖錢者為惑衆投之四裔於是抵罪者不可勝數莽知民愁乃但行小錢直一與大錢五十二品並行龜貝布屬俱寢漢志自王莽亂後貨幣雜用布帛金粟建武十六年馬援上書宜如舊鑄五銖錢帝從之通典靈帝中平三年鑄四出文錢識者曰豈非京師破壞四出散於四方乎通典漢紀獻帝初平二年董卓壞五銖錢更鑄小錢大五分盡取洛陽及長安銅人飛廉之屬充鼓鑄其錢無輪郭文章由是貨賤物貴穀石至數萬錢曹公罷之還用五銖通典通鑑魏文帝黃初二年以穀貴罷五銖錢使百姓以穀帛為市至明帝時錢廢穀用既久人間巧僞漸多競濕穀以要利作薄絹以為市雖處以嚴刑而不能禁也司馬芝等舉朝大議以為用錢非徒豐國亦所以省刑今若更鑄五銖錢則國豐刑省於事為便魏明帝太和元年令更立五銖錢至晉用之不聞有所改創晉志通鑑後漢先主拔成都士衆皆捨干戈赴諸庫藏競取寶物軍用不足甚憂之劉巴曰此易耳但當鑄直百錢平諸物價令吏為官市從之數月之間府庫充實文曰直百亦有勒為五銖並徑七分重四銖孫權嘉平五年鑄大錢一當五百文曰大泉五百徑一寸三分重十二銖赤烏元年又鑄當千錢徑一寸四分重十六銖故吕蒙定荆州孫權賜錢一億錢既大貴但有空名人間患之權聞百姓不以為便省息之鑄為器物晉志通典晉元帝過江用孫氏赤烏舊錢輕重雜行大者謂之比輪中者謂之四文吳興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴後魏孝莊帝初楊侃奏聽人與官並鑄五銖錢從之永安二年秋詔更鑄文曰永安五銖錢官自立爐起自九月至三年正月而止魏志宋文帝元嘉七年冬十月立錢署鑄四銖錢文曰四銖重如其文通鑑通典元嘉二十四年民多剪鑿古錢取銅盜鑄上患之録尚書事江夏王義恭建議請以大錢一當兩右僕射何尚之議曰若令制遂行富人之資自倍貧者彌增其困俱非所以使之均一也上卒從義恭議制大錢一當兩通鑑南史元嘉二十五年罷當兩大錢南史梁武帝鑄錢肉好周郭文曰五銖重四銖三參二黍其百文則重一斤二兩别鑄除其肉郭謂之公式女錢徑一寸文曰五銖重如新鑄五銖二品並行百姓或私以古錢交易者曰五銖曰太平百錢曰定平一百曰稚錢曰五銖曰對文錢曰豐貨曰布泉輕重不一天子頻詔非新鑄二種錢不許用而私用轉甚至普通中乃鑄鐵錢通典梁敬帝太平元年詔雜用古今錢南史太平二年鑄四柱錢一當二十後改四柱錢一當十景申復用細錢南史北齊神武霸政之初猶用永安五銖遷鄴後收境內銅及錢依舊文更鑄文宣天保四年除永安之錢改鑄常平五銖重如其文制造甚精北史隋志後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行隋志建德三年更鑄五行大布錢以一當十收商賈之利與布泉錢並行五年以布泉漸賤廢之隋志宣帝大象元年十一月又鑄永通萬國錢以一當千與五行大布及五銖凡三品並用隋志陳髙祖永定元年四月鑄四柱錢一當二十壬辰改四柱錢丙申復閉細錢通鑑陳文帝天嘉五年改鑄五銖錢一當鵝眼之十南史通鑑陳宣帝大建十一年七月初用大貨六銖錢一當五銖之十與五銖並行帝崩廢六銖隋文帝開皇元年鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩隋志唐髙祖武德四年初行開元通寶錢徑八分重二銖四參積十錢重一兩輕重小大最為折衷逺近便之命給事中歐陽詢撰其文并書回環可讀通鑑通典云一錢重二銖半以下古稱比今稱三之一則今錢為古稱之七銖以上比古五銖則加重二銖以上乾封元年鑄乾封泉寶錢徑一寸重二銖六分一當十踰年而舊錢盡廢通鑑唐書天寶四載以楊慎矜兼諸道鑄錢使唐志肅宗乾元元年經費不足鑄錢使第五琦鑄乾元重寶錢徑一寸每緡重十斤與開元通寶參用以一當十亦號乾元十當錢第五琦為相復命絳州諸爐鑄重輪乾元錢徑一寸二分其文亦曰乾元重寶背之外郭為重輪每緡重十二斤與開元通寶並行以一當五十是時民間行三錢大而重稜者亦號重稜錢法既屢易物價騰踊上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十典莊碾磑等先以實錢典者今以實錢贖先以虛錢典者今以虛錢贖餘交易當用當十錢由是錢有虛實之名唐志會要史思明據東都亦鑄得一元寶錢徑一寸四分以一當開元通寶之百既而惡得一非長祚之兆改其文曰順天元寶唐志乾元四年趙贊請採鄆州白銅鑄大錢以一當十會要代宗即位乾元重寶錢以一當二重輪錢以一當三而大小按此下係原缺詳說案此篇自泉布之設至利孔四散原本脫佚今依文獻通考所引補正泉布之設乃是阜通財貨之物權財貨之所由生者考之於古如管子論禹湯之幣禹以厯山之金湯以莊山之金皆凶年故作幣救民之饑考之周官司市凡國有凶荒則市無征而作布又考單穆公諫景王之說古者天災流行於是量資幣權輕重作幣以救民以管子與周禮單穆公之論觀夏商之時所以作錢幣權一時之宜移民通粟者為救荒而設本非先王財貨之本處論國用三年耕必有一年之食以三十年通制則有九年之食以為財貨之盛三登曰太平王道之盛也以此知古人論財貨但論九年之積初未嘗論所藏者數萬千緡何故所謂農桑衣食財貨之本錢布流通不過權一時之宜而已先有所謂穀粟泉布之權方有所施若是無本雖積鏹至多亦何補盈虛之數所以三代以前論財賦者皆以穀粟為本所謂泉布不過權輕重取之於民所以九貢九賦用錢幣為賦甚少所謂俸祿亦是頒田制祿君卿大夫不過以采地為多寡亦未嘗以錢布為祿所以三代之人多地著不為末作蓋緣錢之用少如制祿既以田不以錢制賦又自以穀粟布帛其間用錢甚少所以錢之權輕惟凶年饑荒所以作幣先儒謂金銅無凶年權時作此以通有無以均多少而已所以三代之前論布泉者甚少到得漢初有天下尚自有古意王公至佐吏以班職之髙下所謂萬石千石百石亦是以穀粟制祿不過口算每人所納百餘年尚未以錢布為重至武帝有事四方是時國用不足立告緡之法以括責天下自此古意漸失錢幣方重大抵三代以前惟其以穀粟為本以泉布為權常不使權勝本所以當時地利既盡浮游末作之徒少後世此制壞以匹夫之家藏鏹千萬與公上爭衡亦是古意浸失故後世貢禹之徒欲全廢此惟以穀帛為本此又却是見害懲艾矯枉過直之論大抵天下之事所謂經權本末常相為用權不可勝經末不可勝本若徒見一時游手末作之弊欲盡廢之如此則得其一不知其二後世如魏文帝當時天下盡不用錢貢禹之論略已施行遂有濕穀薄絹之弊反以天下有用之物為無用其意本要重穀帛反以輕穀帛天下惟得中適平論最難方其重之太過一切盡用及其廢之太過一切盡不用二者皆不得中然三代以前更不得而考自漢至隋其泉布更易雖不可知要知五銖之錢最為得中自漢至隋屢更屢易惟五銖之法終不可易自唐至五代惟武德時初鑄開元錢最得其平自唐至五代惟開元之法終不可易論者蓋無不此為當以此知數千載前有五銖復有開元最可用何故論太重有所謂直百當千之錢論太輕則有所謂榆莢三銖之錢然而皆不得中惟五銖開元銖兩之多寡鼓鑄之精密相望不可易本朝初用開元為法其錢皆可以久行自太宗以張齊賢為江南轉運務欲多鑄錢自此變開元錢法錢雖多其精密俱不及前代本朝張齊賢未變之前所謂太平錢尚自可見齊賢既變法之後錢雖多然甚薄惡不可用當時務要得多不思大體國家之所以設錢以權輕重本末未嘗取利論財計不精者但以鑄錢所入多為利殊不知權歸公上鑄錢雖多利之小者權歸公上利之大者南齊孔顗論鑄錢不可以愛銅惜工若不惜銅則鑄錢無利若不得利則私鑄不敢起私鑄不敢起則斂散歸公上鼓鑄權不下分此其利之大者徒徇小利錢便薄惡如此姦民務之皆可以為錢不出於公上利孔四散乃是以小利失大利南齊孔顗之言乃是不可易之論或者自緣錢薄惡後論者紛紛或是立法以禁惡錢或是惡錢為國賦條目不一皆是不揣其本而齊其末若是上之人不惜銅愛工使奸民無利乃是國家之大利帛布之法總而論之如周如秦如漢五銖如唐開元其規或可以為式此是錢之正也若一時之所鑄如後漢鑄大錢以平軍市之財第五琦鑄乾元錢此是錢之權也如漢武帝以鹿皮為幣王莽以龜貝為幣此是錢之蠧也或見財貨之多欲得廢錢或見財貨之少欲得鼓鑄皆一時矯枉之論不可通行者也若是權一時之宜如冦瑊之在蜀創置交子此一時舉偏救弊之政亦非錢布經久可行之制交子行之於蜀則可於他利害大段不同何故蜀用鐵錢其大者以二十五斤為一千其中者以十三斤為一千行旅賫持不便故當時之券會生於鐵錢不便緣輕重之推移不可以挾持交子之法出於民之所自為託之於官所以可行鐵錢不便交子却便今則銅錢稍輕行旅非不可挾持欲行楮幣銅錢却便楮券不便昔者之便今日之不便議者欲以楮幣公行參之於蜀之法自可以相依而行要非經久之制今日之所以為楮券又欲為鐵錢其原在於錢少或銷為銅器或邊鄙滲漏或藏於富室今所論利害甚悉則利之用在於貿易孔顗之論不惜銅愛工不計多寡此最的當推本論之錢之為物饑不可食寒不可衣至於百工之事皆資以為生不可缺者若是地方既盡穀帛有餘山澤之藏咸得其利錢雖少不過錢重錢雖重彼此相權國家之利亦孔顗之論要當尋古義識經權然後可也厯代制度詳說卷七
