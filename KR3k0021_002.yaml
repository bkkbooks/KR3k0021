body:
  text: 厯代制度詳說卷二宋吕祖謙撰學校制度學官帝曰䕫命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲虞書司徒掌邦教師氏教國子保氏養國子地官大司樂建學政春官大樂正小樂正以詩書禮樂造士王制大司成論說文王世子太常屬官有博士武帝建元五年置博士宣帝黃龍元年增員十二人前漢初武帝立博士書惟有歐陽生禮后倉易楊何春秋公羊而已至孝宣世復立大夏侯勝小夏侯建尚書大戴德小戴聖禮施讐孟喜梁丘賀易穀梁春秋元帝復立京房易平帝立左氏春秋毛萇詩逸禮古文尚書太常卿一人中二千石博士祭酒一人六百石博士十四人比六百石後漢博士祭酒博士本四百石宣帝增秩光武立施孟梁丘京氏歐陽大小夏侯尚書齊轅固魯申公韓嬰毛萇詩大小戴禮嚴彭祖顔安春秋凡十四博士西晉武帝置國子祭酒博士江左增為十六人不復分掌五經而謂之大學博士晉車嗣言二漢舊事博士之職惟舉明經之士遷轉各以本資初無定班開皇中國子不隸太常自前代皆屬太常隋國子監祭酒一人司業二人武德初以國子監曰國子隸太常寺貞觀二年復曰監髙宗龍朔二年改曰司成館咸亨二年復曰監武后垂拱元年改曰成均尋復唐髙宗龍朔二年改博士曰宣業國子監闕司業則以朝官判監事國子監直講以國子監領六學一曰國子學生徒分習五經𢎞文館唐髙宗龍朔二年置於東都上臺生徒三十人崇文館龍朔二年置於東都東宫生徒二十人兩館生徒並以皇族后親三品以上子孫為之廣文館𤣥宗天寶九載置領學子生業進士者西都六十人東都十人學舍有虞氏養國老於上庠養也大學養庶老於下庠小學夏后氏養國老於東序大學養庶老於西序小學商人養國老於右學大學養庶老於左學小學周人養國老於東膠糾也大學養庶老於虞庠小學虞庠在國之西郊王制內則本章注上庠右學在西郊下庠左學在國中王宫之東東膠亦在國中王宫之東西序虞庠在西郊董仲舒曰五帝名大學曰成均唐太宗增築學舍一千二百區選舉志慶厯四年以錫慶院為大學五年以馬軍都虞候公宇為大學熙寧四年復以錫慶院為大學養老四代庠序養老見上凡養老有虞氏以燕禮夏后氏以饗禮商人以食禮周人修而兼用之內則疏云皇氏云人君養老有四種一是養三老五更二是子孫為國難而死者祖父三是養致仕之老四是引户校年養庶人之老熊氏云天子視學之年養老一嵗有四謂四時皆養故鄭氏注凡飲養陽氣凡食養隂氣陽用春夏隂用秋冬是四時凡四也按文王世子云凡大合樂必遂養老注云大合樂謂春入學舍菜合舞秋頒學合聲通前為六又季春大合樂天子視學亦養老世子云凡視學必遂養老是總為七也凡養老五帝憲三王有乞言食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也後漢明帝永平二年十月幸辟雍行養老禮尊事三老李躬為三老兄事五更本紀桓榮三老五更皆取有首妻男女全具者為之蔡雍曰更當為叟譙周曰漢中興三老不答拜後革之和帝魏髙貴鄉公後魏孝文後周武帝皆行養老禮辟雍周大雅文王靈臺於樂辟雍疏云韓詩說辟雍者天子之學圓如璧壅之以水在南方七里之內立明堂於中五經之文所藏處蓋以茅草鄭氏以辟雍在西郊則與明堂宗廟皆異處穎子容云大廟有八名清淨謂之清廟禘祫謂之大廟告朔謂之明堂饗射謂之辟雍占雲謂之靈臺其四門之學謂之太學其中室謂之太室袁凖云死生交錯非其禮矣大司樂疏云三代天子學總曰辟雍漢劉向請興辟雍王莽立辟雍後漢光武中元元年初建明堂辟雍靈臺本記辟雍去明堂三百步顯宗和帝順帝皆臨辟雍饗射魏晉東晉後魏皆有辟雍教法周大宰以九兩繫邦國之民三曰師以賢得民四曰儒以道得民周大司徒以本俗六安萬民四曰聯師儒並周禮王制司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗命鄉簡不帥教者以告耆老皆朝於庠習射尚功習鄉尚齒不變右鄉移左左鄉移右如初禮不變移之郊不變移之遂不變屏之逺方終身不齒樂正崇四術立四教尚書傳曰年十五入小學十八入大學春秋教以禮學冬夏教以詩書王子羣后卿士之適子國之俊選皆造焉不帥教者大樂正以告於王王命三公九卿大夫元士皆入學不變王親視學不變屏之逺方終身不齒王制春夏學干戈秋冬學羽籥大司成論說在東序文王世子比年入學每嵗來入也中年考校間嵗一年視離經辨志離經斷絶句也辨志謂别其心志所趨向也三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成學記漢武帝元朔五年丞相公孫𢎞請太常擇民年十八儀狀端正補博士弟子復其身一嵗能通一藝以上補文學掌故不通罷之儒林傳唐國子授經以周易尚書周禮儀禮禮記毛詩春秋三傳各為一經兼習孝經論語老子太宗詔諸生能通一經者皆署吏太學以四品五品及郡縣公子孫及從三品之曾孫為之慶厯二年國子監言國學除七品以上子孫許試補外八品以下至庶人例不受補每多冒稱欲依唐四門學以八品至庶人子孫補學生從之郡國鄉學周州長春秋以禮會民而射於州序序州黨之學也黨正以禮屬民飲酒於序地官古之教者家有孰黨有庠術有序國有學學記術當為遂諸侯天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫王制頖之言班也所以班政教魯僖公修泮宫泮者半也半有水半無水也半水者蓋東西門以南通水北無水也漢元帝郡國置五經百石卒史儒林傳後魏獻文帝大安元年初立鄉學郡置博士助教後魏郡縣學始乎此梁武帝北齊文宣帝並州郡立學隋開皇二十年廢州縣學煬帝州郡置學官州縣學春秋仲月釋奠髙祖武德七年詔諸州縣及鄉並令置學開元二十一年敕州縣學生兼習吉凶禮公私有禮事處令示儀式太平興國二年賜廬山白鹿洞書史至道二年賜嵩陽書院額咸平四年潭州兵麓書院降經史大中祥符二年賜應天府書院額景祐四年詔藩鎮許立學他州勿聽慶厯四年詔諸州各立學如學者二百人以上許更置縣學祀典大司樂掌成均之法凡有道者有德者使教之死則為樂祖祭於瞽宗春官大胥春入學舍采合舞春官采讀為菜蘋蘩之屬王制疏云釋菜無牲牢幣帛釋奠有牲牢幣帛仲春上丁命樂正習舞釋菜月令凡學春官釋奠於先師秋冬亦如之春官官謂詩書禮樂之官釋奠者直奠置其物無食飲酬酢之禮凡釋奠者必有合也國無先聖先師則所釋奠者必與鄰國合也有國故則否文王世子若周則有周公魯則有孔子則不合也魏齊王正始七年祀孔子以顔淵配東晉祭先聖舊以社日孝武改用孟秋南齊釋奠樂舞牲器悉依上公北齊月朔祭酒領諸生拜孔聖揖顔回四仲月上丁釋奠唐髙祖武德二年釋奠以周公為先聖孔子配享貞觀二年房𤣥齡議晉宋梁陳及隋大業皆以孔子為先聖顔回為先師詔罷周公祠更以孔子為先聖顔回為先師二十二年詔左丘明至范寧二十一人用其書行其道宜配享孔子廟髙宗顯慶二年長孫無忌等議永徽今改用周公為先聖孔子為先師請改從貞觀從之開元八年詔顔回等十哲易為坐像曾參特坐於十哲之次圖七十子及二十二賢於廟壁二十七年制曾參不載四科俾修舊位建隆元年帝親製文宣王兖國公二贊天僖五年以聖製文宣王贊及近臣撰十哲七十二賢贊鏤板幸學天子將出征類於上帝宜乎社造乎禰禡於所征之地受命於祖受成於學定兵謀也出征執有罪反釋奠於學以訊馘告王制天子視學大昕鼓徵所以警衆也文王世子昧爽擊鼓以召衆漢髙帝十二年章帝元和二年安帝延光三年後魏孝文太和十九年唐髙宗乾封元年大中祥符元年皆幸魯祠孔子後漢光武建武四年晉武帝太始七年惠帝元康三年成穆孝武三帝梁武帝天監七年九年北齊孝武永熙中年後周宣帝大象二年隋文帝唐髙祖按自漢光武建武四年至唐髙祖但列纍朝年號不著幸學事實當有缺文建隆元年太祖幸國子監太宗端拱元年幸監召李覺講易泰卦淳化五年孫奭講堯典說命真宗咸平二年崔偓佺講大禹謨仁宗天聖二年馬龜符講說世子齒於學國人觀之曰有父在則禮然其二曰有君在則禮然其三曰長長也文王世子天子設四學當入學而太子齒唐𤣥宗開元七年太子行齒胄禮太子謁先聖為初獻亞獻終獻並以胄子詔褚無量坐講晉惠帝為太子及愍懷太子講經竟並親釋菜於太學元帝大興三年宋文帝元嘉二十二年梁武帝天監八年北齊唐太宗貞觀二十二年髙宗總章元年開曜元年永隆二年中宗景龍二年睿宗先天元年並太子釋奠元嘉釋奠舞六佾天監釋奠著絳紗襮貞觀釋奠太子為初獻國子祭酒張復嗣為亞獻揖司業趙洪智為終獻置博士弟子員前漢髙帝未遑庠序之事孝惠髙后文景諸博士具官待問未有進者武帝元朔五年令太常置博士弟子五十人儒林傳昭帝增百人元帝增千人成帝增三千人後漢質帝遊學至三萬生晉武帝初太學生三千人大始八年七千人東晉孝武帝置太學生六千人後魏道武太學生三千人宋武帝置生三百二十人北齊太學生二百人隋三百六十人唐髙祖百四十員太宗國學八千餘人皇祐二年內舍生以百人為限熙寧元年於內舍二百人外增外舍生一百員四年外舍生不限員上舍一百員內舍二百員漢武帝立五經博士開弟子員設科射策訖於元始一經說至百餘萬言大師衆至千餘人儒林贊江左迄宋齊時或置學不能十年鄉里莫或開館公卿罕通經術梁武帝天監四年開五館建國學以五經教授以明山賔陸璉沈浚嚴植之賀瑒補博士各主一館有數百生慶厯二年侍御史王洙言國子監每科詔下許品官子弟投保官家狀量試藝業給牒充廣文太學律學三館學生多或至千餘人即隨秋試召保取解及科場罷日則生徒散歸居常講筵無一二十人聽講欲自今聽學滿五百日者方得取應從之熙寧四年增廣太學生員分三等以初入學生員為外舍不限員自外舍升內舍自內舍升上舍以百員內舍以二百員為限封爵先聖元帝賜孔霸爵關內侯號褒成君奉孔子後孔光傳平帝元始初諡孔子曰褒成宣尼公後魏孝文大和十六年改諡宣尼曰文宣尼父後周宣帝大象二年封孔子為鄒國公唐髙宗乾封元年贈孔子太師武后天授元年封孔子為隆道公𤣥宗開元二十七年諡孔子為文宣王其後嗣褒聖侯改封嗣文宣王是年顔子贈兖國公閔子騫十哲贈侯曾參七十二子贈伯大中祥符元年諡宣尼曰元聖文宣王後避聖祖名改至聖文宣王立學後漢光武建武四年初起太學光武中年以後専事經學開門受徒者編牒不下萬人光武中元元年初建三雍明帝永平二年親行其禮正坐自講圜橋門而觀聽者蓋億萬計九年期門羽林之士悉令通孝經胸奴亦遣子入學通鑑安帝薄於藝文博士倚席不講學舍鞠為園蔬通鑑順帝永建六年起大學質帝時遊學至三萬餘生然章句漸疏而浮華相尚後漢靈帝熹平四年正五經文字刻石立於太學門外本紀北齊昭帝詔文襄所運石經列於學館外唐文宗命張參定五經鑱之石嘉祐六年章友直篆石經碑魏文帝黃初五年立太學於洛陽吳孫休永夀元年立學蜀時文立遊大學按此七字疑有誤晉武帝修立學校荀顗以制度贊維新鄭沖以儒學登保傅茂先以博學參朝政子真以好禮居秩宗東晉元帝中興賀荀刁杜諸賢並稽古博文東序西郊未聞絃誦自穆帝至武帝並以中堂為太學晉自中朝而迄於江左莫不崇飾華競祖述虛無後魏道武於平城先立太學太武始光三年春起太學於城東後徵盧元髙允等而州郡各舉才學於是人多砥礪儒術轉興孝文遷都洛邑立太學劉芳李彪以經書進崔允邢巒以文吏達宋明帝大始中初置總明觀元儒文史四科南齊武帝永明三年詔立學乃省總明觀北齊興和武定之間儒業復盛後周文帝出魏晉之制度復姬旦之茂典盧景宣修五禮之缺長孫紹逺正六樂之壞明皇纂厯內有崇文之觀外重成均之職宣帝大象二年幸露臺問學自梁武帝至陳天嘉初國學未立天嘉以後稍置學官成業蓋寡隋文帝京邑達於四方皆啓學校講誦之聲道路不絶暮年専尚刑名仁夀之間遂廢天下學惟存國子一所煬帝復開庠序四門學後魏孝文帝遷都洛邑立四門小學詩靈臺疏穎子容春秋釋例云太廟四門之學謂之太學北齊隋皆有四門學隋開皇二十年廢髙祖詔四門學生百三十員髙宗龍朔二年東都四門生三百員俊士二百員西京四門生千三百人其五百人以六品七品及侯伯子男之子為之其八百人以庶人俊造者為之宋文帝元嘉十五年立儒學館十六年命何尚之立𤣥素學何承天立史學謝元立文學雷次宗立儒學為四學按通考及羣書考索謝元立文學下有雷次宗立儒學為四學九字今改正元嘉二十年立國學二十七年廢律博士天監四年置胄子律博士隋律學隸大理寺唐武德初隸國子監尋廢貞觀六年復置髙宗顯慶三年復廢龍朔二年復置學生二十人熙寧六年於國子監制律學書學隋國子寺統國子太學四門書算學唐武德初廢貞觀二年復髙宗顯慶三年又廢龍朔二年東西都復置石經說文字林為顓業算學隋見上唐廢唐顯慶元年復三年又廢龍朔二年東西都復置九章五曹周髀為顓業唐國子監領國子太學廣文四門律書算學醫學太宗貞觀三年置醫學武學𤣥宗開元十九年兩京諸州各置太公廟以張良配享春秋仲月上戊日祭武學人准明經進士行鄉飲酒禮取自古名將十哲七十二弟子肅宗乾元元年不以張良配享上元元年太公望封為武成王享祭一同文宣王正元二年刪去十哲建隆三年建武成王廟四年帝幸武成王廟指白起像曰此人殺已降不武之甚杖畫去之是年六月詔管仲宜塑像升於堂吳起宜畫像降於廡下大中祥符元年詔武成王加諡昭烈武成王慶厯三年五月置武學於武成王廟以阮逸為教授八月罷武學熙寧五年六月詔於武成王廟置學按此下原缺侍中髙陽王雍上表曰竊惟三載考績百王通典今任事上中者三年升一階散官上第者四載登一級閒冗官本非虛置或以賢能而進或因纍勤而舉如其無能不應忝兹髙選以勤以能進之朝伍或征官外戍逺使絶域催督逋懸察檢州鎮皆是散官以充劇使乃於考陟排同間伍檢散官之人才非皆劣稱事之輩未必悉賢而考間以多課煩以少上乖天澤之均下生不等之苦復尋正始之格泛後任事上中者三年升一階泛前任事上中者六年進一級三年一考自古通經今以泛前六年升一階檢無僭犯倍年成級以此推之明以泛代考也徐州刺史蕭寶寅又論曰方今守令厥任非輕及課悉以六載為程既而限滿代還復經六年而叙是則嵗周十二始得一階於東西兩省文武間職公府散佐無事冗官或數旬方應一直或弦朔止於暫朝及其考日更得四年為限是則一紀之內便登三級彼以實勞劇任而遷貴之路至難此以散位虛名而升陟之方甚易何內外之相懸令厚薄之如是孝明帝延昌二年又將大考百寮散騎常侍領三公郎中崔鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝升夕進年嵗數遷豈拘一階半級閡以同寮等位者哉二漢以降太和以前茍必官須此人人稱其職或超騰轉陟數嵗而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之稱國號豐賢之美竊見景明以來考格三年成一考轉一階貴賤內外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如龔黃儒學如王鄭才史如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一槩不曾甄别琴瑟不調改而更張雖明㫖已行猶宜消息時不從大唐考課之法有德義清慎公平恪勤各一善自近侍至於鎮防並據執事目為之最凡二十七焉一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有二善或無最而有三善為上下一最以上有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最弗聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官諂詐及貪濁有狀為下下若於善最之外别有可嘉尚及罪雖成殿而情狀可矜或雖不成殿而情狀可責者省校之日皆聽考官臨時量定諸州縣官人撫育有方戶口增益者各准見户為十分論每加一分刺史縣令各進考一等增户口謂課丁率一丁同一戶法增不課口者每五口同一丁例其有破除者得相折其州户口不滿五千縣戶不滿五百者各准五千五百户法為分若撫養乖方户口減損者各准增户法亦每減一分降一等課及不課並准上文其勸課農田能使豐殖者亦准見地為十分論每加一分各進考一等此謂永業口分之外别能墾起公私荒田者其有不加勸課以致減損者謂永業口分之內有荒廢者每損一分降考一等若數處有功並應進考者並聽纍加貞觀六年監察御史馬周上疏曰今流內九品以上有九等考第自比年不過中上未得有上下以上考者臣謂所設九等正考當今之官必不施之於異代也縱使朝廷實無好人猶應於見在之內比校其尤善者以為上第豈容皇朝士人遂無堪上下之考朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜每年選天下政術尤最者一二人為上上其次為上中其次為上下則中人以上可以自勸矣神龍中御史中丞盧懷慎上疏曰臣聞孔子曰為邦百年可以勝殘去殺又曰茍有用我者期月已可三年有成故書云三載考績校其功也子産賢者也其為政尚纍年而化成況其常材乎竊見比來州縣官佐下車布政有多者一二年少者三五月遽即遷除不論課考或厯時未改便傾耳而聽企踵而覩爭求冒進不顧廉恥亦何暇宣風布化求瘼恤人哉户口流散百姓凋弊職為此也何則人知吏之不久則不從其吏吏知遷之不遙又不盡其能偷安茍且脂韋而已又古之為吏者長子孫倉氏庾氏即其後也臣請都督刺史上佐兩畿縣令等在任未按此下原缺厯代制度詳說卷二
