body:
  text: 厯代制度詳説卷十宋吕祖謙撰屯田制度北邊屯田漢文帝時晁錯言曰逺方之卒守塞一嵗而更不知敵人之能不如選常居者家室田作且以備之以便為之髙城深壍中周虎落虎落者以竹蔑相連遮落者也先為室屋具田器乃募罪人及免徒復作令居之不足募民之欲往者賜髙爵復其家予冬夏衣廩食能自給而止上從其言募民實塞下錯復言古之徙逺方也相其隂陽之和嘗其水泉之味審其土地之宜先為築室家有二堂二内門户之閉置器物焉為置醫巫以救疾病所以使民樂其處也晁錯傳西域屯田漢武帝征和二年搜粟都尉桑𢎞羊與丞相御史奏言輪臺東捷枝渠犂有溉田五千頃以上可遣屯田卒置校尉三人分䕶上乃下詔深陳既往之悔曰遣卒逺田輪臺欲起亭隧是擾勞天下非所以優民也朕不忍聞渠犂傳漢昭帝元鳯四年樓蘭尉屠耆請天子曰國中有伊循城其地肥美願漢遣一将屯田積穀於是漢遣司馬一人吏士四十人田伊循以鎮撫之通鑑漢書漢宣帝地節二年漢遣侍郎鄭吉司馬熹将免刑罪人田渠犂積穀欲攻車師至秋收穀吉熹發兵擊車師車師降有詔還田渠犂車師後車師遣騎來擊田者漢公卿議以道逺煩費可且罷車師田者吉乃得歸化三校尉屯田其後置戊己校尉屯田居車師故地西漢永平十六年明帝北征匈奴取伊吾廬地今在伊州伊吾縣也置宜和都尉以屯田遂通西域章帝建初二年復罷屯田伊吾後漢和帝永元二年擊伊吾破之三年班超定西域復置戊己校尉後漢隴右屯田漢昭帝始元二年詔發習戰射士詣朔方調故吏將屯田張掖郡通典漢書漢宣帝神爵元年先零畔逆他種刼掠背叛趙充國至金城計欲以威信招降罷騎兵屯田以待其敝上奏曰臣所将吏士調度甚廣計度臨羌東至浩亹羌中故田及公田民所未墾可二千頃以上其間郵亭多壊敗者臣前部士入山伐林木六萬餘枚在水次臣願罷騎兵留步兵萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處氷解漕下繕鄉亭浚溝渠治隍陿以西道橋七十所令可至鮮水左右田事出賦人二十畆至四月草生發郡騎及屬國車騎各千就草為田者遊兵以充入金城郡益積蓄省大費今司農所轉穀至者足支萬人一嵗食上報曰即如将軍之計羌當何時伏誅充國乃條不出兵留田便宜十二事宜留屯田得十二便出兵失十二利上復報曰將軍熟計充國奏曰臣今留步士屯田地勢平易多髙山逺望之便部曲相保為壍壘木樵校聨不絶便兵弩飭鬬其烽火幸通勢及并力以逸待勞兵之利也充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八魏相言臣任其計必可用上於是報充國嘉納之明年五月羌降者三萬一千二百人遺脱不過四千人請罷屯田遂振旅而還通鑑後漢和帝永元十四年安定降羌燒何種反曹鳳請廣設屯田隔塞羌人交關之路及省委輸之役上乃擢鳳為金城西部都尉後增廣屯田列屯夾河合三十四部其功垂立會永初中諸羌叛乃罷通鑑南邊屯田漢元帝初元三年詔曰珠崖背叛議者之言狐疑避難則守屯田通於時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉其罷珠崖郡通典荆襄屯田後漢光武建武四年劉隆討李憲憲平遣隆屯田武當漢書晉武泰始五年帝有滅吳之志以羊祜都督荆州鎮襄陽減戍邏郎估反游兵也之卒以墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積通鑑關陜屯田光武建武六年王霸屯田新安後漢蜀建興十二年諸葛亮屯五丈原以前者數出皆以運糧不繼使巳志不伸乃分兵屯田為久駐之計耕者雜於渭濵居民之間而百姓安堵軍無私焉通鑑唐徳宗建中初楊炎請屯田豊州發關輔民鑿陵陽渠嚴郢習朔邊利病即奏舊屯肥饒地今十不墾一水田甚廣力不及而廢若發二京關輔民浚豐渠營田擾而無利請以内苑蒔稻驗之秦地膏腴田上上耕者皆畿人月一代功甚易臣猶恐終嵗穫不酬費況二千里發人出塞而嵗一代乎是虚畿甸事空徭也郢又言五城舊屯地至廣請以鑿渠糧俾諸城夏貸冬輸取渠工布帛給田者令據直轉谷則關輔免調發而諸城闢田炎不許嚴郢傳唐憲宗元和中振武軍饑宰相李絳請開營田可省度支漕運及絶和糴欺隠憲宗稱善乃以韓重華為振武京西營田和糴水運使起代北墾田三百頃出贓罪吏九百餘人給以耒耜耕牛假種糧使償所負粟一嵗大熟因募人為十五屯每屯百三十人耕百頃就髙為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三千八百餘里嵗收粟二十萬石省度支錢二十餘萬緡重華入朝奏請益開田五千頃法用人七千可以盡給五城會李絳已罷後宰相持其議而止唐食貨志河南屯田後漢獻帝建安元年中平以來天下亂離民棄農業諸軍並起率乏糧穀無終嵗之計羽林監棗祗及韓浩請建置屯田曹操從之以祗為屯田都尉以騎都尉任峻為典農中郎将募民屯田許下今潁州郡許昌縣也得穀百萬斛於是州郡例置田官所在積穀倉廩皆滿故操征伐四方無運糧之勞遂能兼并羣雄軍穀之饒起於祗而成於峻魏武故事載令曰孤定許當興立屯田時議者皆言當計牛輸穀佃科以定施行後棗祗白以為僦牛輸穀大收不增穀有水旱灾除大不便反覆來説孤猶以為當如故祗猶執之孤不知所從使與荀令君議之時故軍祭酒侯聲云如祗議於官便於客不便以疑令君祗猶自信還白執分田之術孤乃然之使為屯田都尉其時嵗則大收後遂因此大田豐足軍用魏志通鑑淮南屯田漢獻帝建安十四年秋七月曹操引水軍自渦入淮出肥水軍合肥開芍陂屯田通鑑魏齊王芳正始四年司馬懿督諸軍伐吳時欲廣田蓄穀為滅賊資使鄧艾行陳項以東至夀春艾以為良田水少不足以盡地利宜開河渠引水澆溉又通漕運之道乃著濟河論以諭其指又以為昔破黄巾因為屯田積穀於許都以制四方今以三隅既定事在淮南每大軍征舉運兵過半功費鉅億陳蔡之間上下田良可省許昌左右諸稻田并水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗吳無往而不克矣懿如艾計遂北臨淮水自鍾離西南横石以西盡泚水四百里五里置一營營六十人且佃且守兼修廣淮陽百尺二渠上引河流下通淮潁大理諸陂於潁南北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自夀春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍興衆泛舟而下達於江淮資食有儲而無水害艾所建也通典晉志宋文帝元嘉二十三年魏人冦兖青冀三州殺掠甚衆帝以咨訪羣臣御史中丞何承天上安邊論曰今若欲追蹤衛霍自非大田淮泗内實青徐使民有贏儲野有積穀然後發精卒十萬一舉蕩平則不足為也通鑑江南屯田吳孫權黄武五年陸遜以所在少穀表令諸将增廣農畆權報曰甚善今孤父子親自受田軍中八牛以為四耦雖未及古人亦欲與衆均等其勞也吳志通鑑河北屯田晉武帝咸寧元年十二月詔曰出戰入耕雖自古常然事力未息未嘗不以戰士為念也今以鄴奚官奴婢著新城代田兵種稻奴婢各五十人為一屯屯置司馬使皆如屯田法晉志營田隋開皇三年於河西勒百姓立堡營田隋志唐開元年復營州以姜師度為營田度支使使開屯田八十餘所唐開軍府以捍要衝因隙地置營田天下屯總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸腴瘠播殖地宜與其功庸煩省皆決於尚書省苑内屯以善農者為屯官屯副御史巡行莅輸上地五十畆瘠地二十畆稻田八十畆則給牛一諸屯以地之良薄嵗之豐凶為三等其民田嵗穫多少取中熟為率凡屯田收多者襃進之開元二十五年詔屯官敘功以嵗豐凶為上下鎮戍地可耕者人給十畆以供糧方春屯官巡行謫作不時者天下屯田收穀百九十餘萬斛食貨志唐文宗太和末王起奏立營田後黨項大擾河西邠寧節度使畢諴亦募士開營田嵗收三十萬斛省度支錢數百萬緡食貨志國朝諸路惟襄定唐三州有營田務知州並兼制置營田使或營田事通判亦同領其事而河北轉運使兼西路招置營田使河東轉運使兼東路招置營田使會要端拱二年以陳恕為河北東路招置營田使欲大興營田宋興當雍熙之間敵人累為邊害天子念守兵嵗廣於是方田之法自此始是後開易水疏雞距修鮑河之利邊屯以次立矣乃遣議臣東出宿亳夀春西出許潁轉陳蔡之間至襄鄧得田可治者三十二萬頃欲修耕屯之業度其功用天子尤意嚮之而任事者破壊其計故功不立曾南豐集詳説入敵境為國守取敵地為國圉者古人之所以置屯也斥地與敵守内虚外以常為變以易為難今世之不得守兵也善為國者豈固幸天下之多事必入敵境取敵地而守之因間出竒而後可以為功哉天下有道守在四裔諸侯有道守在四鄰此善守之喻也當漢唐之盛拓大蠻貊無田之地砂磧蒼莽之中置將屯兵以守其間而耐事忍辱志於功名者或厯數十年之逺勵敕吏士以必死守之若此者宜非仁人之所願矣自孫氏東晉相承為南北之成勢犬牙所入尺寸之地必争焉故彼得而强此失而弱國家之輕重視其屯戍之善否而其人亦有隨其當世卓然能以功名自見而號為善守者彼此之必争勢之所不能已則惟仁人志士豈容有捨之而不論者乎方天下之無事守於邊境不足守之地因間出竒以為功者非也有事而欲處之以無事無事而卒不免憂其有事守内虚外以易為難是尤非也今淮之内守者為建康襄之内守者為丹陽漢之内守者為鄂渚而浙之為内守者行都是也天下固不當有防内地置重兵而謂之守者也敵人窺視兵革四起疆埸之間朝秦暮楚曰守可也委長淮之扞蔽弱襄漢之鎮撫或自庭而堂自堂而室守之可乎敵之通好久矣聘使往來玉帛交贄而吾重兵於江漢之上流教戰擊柝夜不解甲而寐惴惴然常若敵人之在傍自以為無難於此矣將有驕心士有徳色數日以待賞少不滿其意則怨且怒自以為功名之盛無以逾於此矣州郡以土兵自守在廂者給厮役在禁者迭征戍每一當行去妻子離父母握手流涕而不忍訣縱掠奪肆侵侮出驕嫚不遜之詞以恐動州縣而居人列肆晝閉以待過軍自以為征役調發無大於此矣夫警備於平居無事之時屯守於閫奥至安之地未嘗有一日之戰而上下交以為至難此所謂斥地與敵守内虚外以常為變以易為難者耶雖孫氏東晉南北之常勢固不暇講況敢望其如漢唐之守邊屯兵乎況敢望如藝祖之世郭進李漢超之勲伐乎且夫事不急則力不倍勢不難則功不立天下惟無事也是以豢養驕惰至此将欲振勵警䇿作天下之氣用六軍之死命則屯守之規摹固将有所改易不如今日而遂已也厯代制度詳説卷十
